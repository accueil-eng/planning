    if(!chIds.length){
      html+="<tr><td colspan='"+(2+weeks.length*6)+"' style='"+tdStyle()+"color:var(--muted);font-style:italic'>Aucune affectation — utilisez le menu ci-dessus</td></tr>";
    } else {
      chIds.forEach(function(chId){
        var ch=chantierMap[chId];
        html+="<tr style='background:#f0f9ff'>";
        html+="<td style='"+tdStyle()+"font-weight:500;white-space:nowrap;background:#dbeafe;padding-left:14px'>"+ch.nom+"</td>";
        // Total mois (calculated from inputs)
        var chTotal=0;
        weeks.forEach(function(wk){
          getDatesOfWeek(wk,annee).forEach(function(dt,di){
            var inMc=(dt.getMonth()+1===mois&&dt.getFullYear()===annee);
            if(!inMc)return;
            var stored=ptGet(mois,annee,"ch_"+chId,sal.id,wk,di);
            var def=ch.weeks[wk+"|"+di]||0;
            chTotal+=parseFloat(stored!==""?stored:def)||0;
          });
        });
        html+="<td style='"+tdStyle()+"text-align:right;font-weight:700;background:#dbeafe;color:#0891b2'>"+(chTotal||"")+"</td>";
        // Weekly cells — editable inputs
        weeks.forEach(function(wk){
          var wkT=0;
          getDatesOfWeek(wk,annee).forEach(function(dt,di){
            var inMc=(dt.getMonth()+1===mois&&dt.getFullYear()===annee);
            if(!inMc){html+="<td style='"+tdStyle()+"background:#f5f5f5'></td>";return;}
            var stored=ptGet(mois,annee,"ch_"+chId,sal.id,wk,di);
            var def=ch.weeks[wk+"|"+di]||0;
            var val=stored!==""?stored:(def>0?def:"");
            wkT+=parseFloat(val)||0;
            html+="<td style='"+tdStyle()+"padding:1px;text-align:center;background:#eff6ff'>";
            html+="<input type='number' value='"+(val||"")+"' min='0' step='0.5' style='width:34px;height:22px;border:1px solid #bae6fd;border-radius:3px;font-size:10px;text-align:center;padding:0 2px;outline:none;background:#eff6ff;color:#0891b2;font-weight:600'";
            html+=" data-pt='"+mois+"|"+annee+"|ch_"+chId+"|"+sal.id+"|"+wk+"|"+di+"' onchange='ptNum(this)'>";
            html+="</td>";
          });
          html+="<td style='"+tdStyle()+"text-align:right;font-weight:700;background:#fef9c3;color:#0891b2'>"+(wkT||"")+"</td>";
        });
        html+="</tr>";
      });

      // Total chantiers row
      html+="<tr style='background:#dbeafe'>";
      html+="<td style='"+tdStyle()+"font-weight:700'>TOTAL chantiers</td>";
      var grandCh=0;
      weeks.forEach(function(wk){
        getDatesOfWeek(wk,annee).forEach(function(dt,di){
          var inMt=(dt.getMonth()+1===mois&&dt.getFullYear()===annee);if(!inMt)return;
          chIds.forEach(function(id){
            var st=ptGet(mois,annee,"ch_"+id,sal.id,wk,di);
            var df=chantierMap[id].weeks[wk+"|"+di]||0;
            grandCh+=parseFloat(st!==""?st:df)||0;
          });
        });
      });
      html+="<td style='"+tdStyle()+"text-align:right;font-weight:700;color:#0891b2'>"+grandCh+"</td>";
      weeks.forEach(function(wk){
        getDatesOfWeek(wk,annee).forEach(function(dt,di){
          var inMt2=(dt.getMonth()+1===mois&&dt.getFullYear()===annee);
          if(!inMt2){html+="<td style='"+tdStyle()+"background:#f5f5f5'></td>";return;}
          var t=0;chIds.forEach(function(id){var st=ptGet(mois,annee,"ch_"+id,sal.id,wk,di);var df=chantierMap[id].weeks[wk+"|"+di]||0;t+=parseFloat(st!==""?st:df)||0;});
          html+="<td style='"+tdStyle()+"text-align:center;font-weight:700;color:#0891b2'>"+(t||"")+"</td>";
        });
        var wkT=0;chIds.forEach(function(id){getDatesOfWeek(wk,annee).forEach(function(dt,di){var st=ptGet(mois,annee,"ch_"+id,sal.id,wk,di);var df=chantierMap[id].weeks[wk+"|"+di]||0;wkT+=parseFloat(st!==""?st:df)||0;});});
        html+="<td style='"+tdStyle()+"text-align:right;font-weight:700;background:#fef9c3;color:#0891b2'>"+(wkT||"")+"</td>";
      });
      html+="</tr>";
    }

    html+="</table></div></div>";
  });

  wrap.innerHTML=html;
}

function thStyle(){return "border:1px solid #cbd5e1;padding:5px 6px;background:#e2e8f0;font-weight:600;text-align:center;white-space:nowrap;";}
function tdStyle(){return "border:1px solid #e2e8f0;padding:3px 5px;vertical-align:middle;";}

function ptZoneChange(el){
  var p=el.dataset.pt.split("|");
  ptSet(parseInt(p[0]),parseInt(p[1]),p[2],p[3],parseInt(p[4]),parseInt(p[5]),el.value);
  // Update cell background color
  var c=el.value?(ZONE_COLORS[el.value]||{bg:"#fff",border:"#e2e8f0"}):{bg:"#fff",border:"#e2e8f0"};
  el.parentElement.style.background=c.bg;
  el.style.border="1px solid "+c.border;
  el.style.background=c.bg;
  RPOINTAGE();
}

function resetConduiteMois(){
  var mois=parseInt(document.getElementById("pt-mois").value);
  var annee=parseInt(document.getElementById("pt-annee").value);
  if(!confirm("Effacer toutes les valeurs de conduite (non validées) pour "+mois+"/"+annee+" ?"))return;
  var weeks=getWeeksOfMonth(mois,annee);
  var count=0;
  D.salaries.forEach(function(sal){
    weeks.forEach(function(wk){
      getDatesOfWeek(wk,annee).forEach(function(dt,di){
        var raw=ptGet(mois,annee,"conduite",sal.id,wk,di);
        if(raw){
          try{
            var d=JSON.parse(raw);
            if(!d.validated){ptSet(mois,annee,"conduite",sal.id,wk,di,"");count++;}
          }catch(e){ptSet(mois,annee,"conduite",sal.id,wk,di,"");count++;}
        }
      });
    });
  });
  RPOINTAGE();

  var cwKey=mon.getFullYear()+"-"+("0"+(mon.getMonth()+1)).slice(-2)+"-"+("0"+mon.getDate()).slice(-2);
  var di=dow-1;
  for(var r=0;r<10;r++){
    var ck=cwKey+"|"+r+"|"+di;
    if((D.cells[ck]||[]).indexOf(salId)>=0){
      var chId=D.rowChantiers[cwKey+"|"+r];
      if(chId)return D.chantiers.find(function(c){return c.id===chId;})||null;
    }

  return null;
}

      var cells=[];

          var v;
          if(row.id==="conduite"){
            var rawC=ptGet(mois,annee,row.id,sal.id,wk,di);
            if(rawC){try{var cdExp=JSON.parse(rawC);v=cdExp.validated?(parseFloat(cdExp.h)||0).toFixed(2):"0";}catch(e){v="0";}}else v="0";
          }
          else if(row.type==="rtt"){var sr=ptGet(mois,annee,row.id,sal.id,wk,di);v=sr!==""?sr:(di<4?"0.5":"");}

          else if(row.type==="check") v=ptGet(mois,annee,row.id,sal.id,wk,di)=="1"?"1":"0";
          else v=ptGet(mois,annee,row.id,sal.id,wk,di)||"0";
          cells.push(v);wkT+=parseFloat(v)||0;totalMois+=parseFloat(v)||0;
        });
        cells.push(wkT);
      });
      line.push(totalMois);cells.forEach(function(c){line.push(c);});
      lines.push(line.join("\t"));
    });
    // Chantier hours per chantier
    var chMapExp={};
    weeks.forEach(function(wk){
      getDatesOfWeek(wk,annee).forEach(function(dt){
        getChantierHoursPerDay(sal.id,dt).forEach(function(e){

        });
      });

var _driveCache={};

// Siege coords (fixed — no geocoding needed)
var SIEGE_LON="-0.4936";var SIEGE_LAT="47.5089";
// Fontevraud coords for Gouas and Chabrillat
var FONTEVRAUD_LON="0.0529";var FONTEVRAUD_LAT="47.1797";
var SALS_FONTEVRAUD_COND=["GOUAS","CHABRILLAT"];

function getSiegeCoordsForSal(sal){
  var nom=(sal.nom||"").toUpperCase();
  for(var i=0;i<SALS_FONTEVRAUD_COND.length;i++){
    if(nom.indexOf(SALS_FONTEVRAUD_COND[i])>=0)return {lon:FONTEVRAUD_LON,lat:FONTEVRAUD_LAT};
  }
  return {lon:SIEGE_LON,lat:SIEGE_LAT};
}

function getDriveTime(adresse,cp,ville,cb,siegeCoords){
  var dest=((adresse||"")+" "+(cp||"")+" "+(ville||"")).trim();
  if(!dest){cb(null);return;}
  var sLon=(siegeCoords||{}).lon||SIEGE_LON;
  var sLat=(siegeCoords||{}).lat||SIEGE_LAT;
  var cacheKey=sLon+"|"+sLat+"|"+dest;
  if(_driveCache[cacheKey]!==undefined){cb(_driveCache[cacheKey]);return;}

  // Use French gov geocoding API (CORS-friendly)
  var query=encodeURIComponent(dest);
  fetch("https://api-adresse.data.gouv.fr/search/?q="+query+"&limit=1")
  .then(function(r){return r.json();})
  .then(function(data){
    if(!data.features||!data.features.length){_driveCache[cacheKey]=null;cb(null);return;}
    var coords=data.features[0].geometry.coordinates;
    var dLon=coords[0],dLat=coords[1];
    return fetch("https://router.project-osrm.org/route/v1/driving/"+sLon+","+sLat+";"+dLon+","+dLat+"?overview=false");
  })
  .then(function(r){if(!r)return null;return r.json();})
  .then(function(data){
    if(data&&data.routes&&data.routes[0]){
      var secs=data.routes[0].duration;
      console.log("OSRM duration (secs):",secs,"mins:",secs/60);
      var mins=secs/60;
      // Centièmes d'heure aller-retour: (mins/60)*2*100
      // Heures décimales aller-retour, arrondi à 2 décimales
      var centVal=(Math.round((secs/3600)*2*100)/100).toFixed(2);
      console.log("OSRM duration (secs):",secs,"result:",centVal);
      _driveCache[cacheKey]=centVal;
      cb(centVal);
    } else {_driveCache[cacheKey]=null;cb(null);}
  }).catch(function(e){console.log("Drive error:",e);_driveCache[cacheKey]=null;cb(null);});
}

function getOrCalcDriveTime(chId,siegeKey,cb){
  // siegeKey: "ecouflant" or "fontevraud"
  if(!D.chantierDriveTimes)D.chantierDriveTimes={};
  var cacheKey=chId+"|"+siegeKey;
  if(D.chantierDriveTimes[cacheKey]!==undefined){cb(D.chantierDriveTimes[cacheKey]);return;}
  var ch=D.chantiers.find(function(c){return c.id===chId;});
  if(!ch){cb(null);return;}
  var sc=siegeKey==="fontevraud"?{lon:FONTEVRAUD_LON,lat:FONTEVRAUD_LAT}:{lon:SIEGE_LON,lat:SIEGE_LAT};
  getDriveTime(ch.adresse,ch.cp,ch.ville,function(h){
    if(h!==null){
      D.chantierDriveTimes[cacheKey]=h;
      save();
    }
    cb(h);
  },sc);
}

function recalcAllChantierDriveTimes(){
  if(!D.chantiers.length){showToast("Aucun chantier.");return;}
  D.chantierDriveTimes={};
  var sieges=["ecouflant","fontevraud"];
  var tasks=[];
  D.chantiers.filter(function(c){return !c.done&&(c.adresse||c.ville);}).forEach(function(ch){
    sieges.forEach(function(sk){tasks.push({ch:ch,sk:sk});});
  });
  if(!tasks.length){showToast("Aucun chantier avec adresse.");return;}
  showToast("Calcul de "+tasks.length+" trajets...");
  var done=0;
  tasks.forEach(function(t){
    getOrCalcDriveTime(t.ch.id,t.sk,function(h){
      done++;
      if(done===tasks.length){RPOINTAGE();showToast("✅ Référentiel trajets mis à jour !");}
    });
  });
}

// Auto-fill zone in pointage when chantier is found
function autoFillZones(mois, annee){
  var weeks=getWeeksOfMonth(mois,annee);
  var pending=0;
  D.salaries.forEach(function(sal){
    weeks.forEach(function(wk){
      getDatesOfWeek(wk,annee).forEach(function(dt,di){
        var inM=(dt.getMonth()+1===mois&&dt.getFullYear()===annee);
        if(!inM)return;
        var dow=dt.getDay()||7;
        var mon=new Date(dt);mon.setDate(dt.getDate()-(dow-1));
        var cwMon=mon.getFullYear()+"-"+("0"+(mon.getMonth()+1)).slice(-2)+"-"+("0"+mon.getDate()).slice(-2);
        var n=typeof getNR==="function"?getNR():6;
        for(var r=0;r<n;r++){
          var ck=cwMon+"|"+r+"|"+di;
          if((D.cells[ck]||[]).indexOf(sal.id)>=0){
            var chId=D.rowChantiers[cwMon+"|"+r];
            var ch=chId?D.chantiers.find(function(c){return c.id===chId;}):null;
            if(ch&&ch.adresse){
              // Only fill if not already set
              var existT=ptGet(mois,annee,"trajet",sal.id,wk,di);
              var existTr=ptGet(mois,annee,"transport",sal.id,wk,di);
              if(!existT&&!existTr){
                pending++;
                (function(salCopy,wkCopy,diCopy,chCopy){
                  getZoneForSalChantier(salCopy,chCopy,function(result){
                    pending--;
                    if(result){
                      ptSet(mois,annee,"trajet",salCopy.id,wkCopy,diCopy,result.zone);
                      ptSet(mois,annee,"transport",salCopy.id,wkCopy,diCopy,result.zone);
                    }
                    if(pending===0){RPOINTAGE();showToast("✅ Zones calculées automatiquement !");}
                  });
                })(sal,wk,di,ch);
              }
            }
          }
        }
      });
    });
  });
  if(pending===0)showToast("ℹ️ Toutes les zones sont déjà renseignées.");
}

  INDEM_ZONES.forEach(function(z){
    html+="<th colspan='2' style='border:1px solid #cbd5e1;padding:6px 6px;background:#c7d2fe;color:#3730a3;text-align:center'>"+z+"</th>";
  });
  html+="<th style='border:1px solid #cbd5e1;padding:6px 10px;background:#fef9c3;font-weight:700;text-align:center'>Total (€)</th>";
  html+="</tr>";

  // Sub-header
  html+="<tr>";
  html+="<th style='border:1px solid #cbd5e1;padding:4px 10px;background:#e2e8f0'></th>";
  INDEM_ZONES.forEach(function(z){
    html+="<th style='border:1px solid #cbd5e1;padding:4px 6px;background:#dbeafe;font-size:10px;text-align:center'>Trajet</th>";
    html+="<th style='border:1px solid #cbd5e1;padding:4px 6px;background:#dcfce7;font-size:10px;text-align:center'>Transport</th>";
  });
  html+="<th style='border:1px solid #cbd5e1;padding:4px;background:#fef9c3'></th>";
  html+="</tr>";

  // Data rows
  sals.forEach(function(sal){
    var nomAff=(sal.nom?sal.nom+" ":"")+sal.prenom;
    html+="<tr>";
    html+="<td style='border:1px solid #e2e8f0;padding:6px 10px;font-weight:500;white-space:nowrap'>"+nomAff+"</td>";
    var totalSal=0;
    INDEM_ZONES.forEach(function(z){
      var trajetNb=0,transportNb=0;
      weeks.forEach(function(wk){
        getDatesOfWeek(wk,annee).forEach(function(dt,di){
          var inM=(dt.getMonth()+1===mois&&dt.getFullYear()===annee);
          if(!inM)return;
          if(ptGet(mois,annee,"trajet",sal.id,wk,di)===z) trajetNb++;
          if(ptGet(mois,annee,"transport",sal.id,wk,di)===z) transportNb++;
        });
      });

      var tarifT=D.grille.trajet[z]||0;
      var tarifTr=D.grille.transport[z]||0;
      var montantT=trajetNb*tarifT;
      var montantTr=transportNb*tarifTr;
      totalSal+=montantT+montantTr;
      html+="<td style='border:1px solid #e2e8f0;padding:4px 6px;text-align:center;background:#eff6ff;color:#1d4ed8'>"+(trajetNb||"")+"</td>";
      html+="<td style='border:1px solid #e2e8f0;padding:4px 6px;text-align:center;background:#f0fdf4;color:#15803d'>"+(transportNb||"")+"</td>";
    });
    html+="<td style='border:1px solid #e2e8f0;padding:4px 10px;text-align:right;font-weight:700;background:#fef9c3;color:#92400e'>"+(totalSal>0?totalSal.toFixed(2)+" €":"—")+"</td>";
    html+="</tr>";
  });

  html+="</table>";
  html+="<p style='margin-top:10px;font-size:11px;color:#7a746c;font-style:italic'>Les nombres affichés proviennent de l&#39;onglet Pointage (rubriques Trajet et Transport par zone).</p>";
  wrap.innerHTML=html;
}

function exportIndemCSV(){
  var mois=parseInt(document.getElementById("indem-mois").value);
  var annee=parseInt(document.getElementById("indem-annee").value);
  var MOIS_NOMS=["","Janvier","F\u00e9vrier","Mars","Avril","Mai","Juin","Juillet","Ao\u00fbt","Septembre","Octobre","Novembre","D\u00e9cembre"];
  var lines=["Indemnit\u00e9s de d\u00e9placement — "+MOIS_NOMS[mois]+" "+annee,""];
  var hdr=["Salarié"];
  INDEM_ZONES.forEach(function(z){hdr.push("Trajet "+z+" (nb)","Transport "+z+" (nb)","Montant "+z+" (\u20ac)");});
  hdr.push("TOTAL (\u20ac)");
  lines.push(hdr.join("\t"));
  var sals=D.salaries.filter(function(s){return s.prenom&&s.prenom.trim();});
  var weeks=getWeeksOfMonth(mois,annee);
  sals.forEach(function(sal){
    var row=[(sal.nom?sal.nom+" ":"")+sal.prenom];
    var total=0;
    INDEM_ZONES.forEach(function(z){
      var tn=0,trn=0;
      weeks.forEach(function(wk){
        getDatesOfWeek(wk,annee).forEach(function(dt,di){
          var inM=(dt.getMonth()+1===mois&&dt.getFullYear()===annee);if(!inM)return;
          if(ptGet(mois,annee,"trajet",sal.id,wk,di)===z) tn++;
          if(ptGet(mois,annee,"transport",sal.id,wk,di)===z) trn++;
        });
      });
      var m=tn*(D.grille.trajet[z]||0)+trn*(D.grille.transport[z]||0);
      total+=m;
      row.push(tn,trn,m.toFixed(2));
    });
    row.push(total.toFixed(2));
    lines.push(row.join("\t"));
  });
  var blob=new Blob(["\uFEFF"+lines.join("\n")],{type:"text/tab-separated-values;charset=utf-8"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="Indemn\u00eet\u00e9s_"+MOIS_NOMS[mois]+"_"+annee+".csv";a.click();
  showToast("\uD83D\uDCE5 Export t\u00e9l\u00e9charg\u00e9 !");
}
