<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fonteneau Rénovation – Planning</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surf:#fff;--s2:#eeecea;--brd:#e0dbd3;--brd2:#c5bfb5;
  --txt:#1a1916;--muted:#7a746c;--dim:#b5afa7;
  --acc:#2563eb;--acc-bg:#eff6ff;
  --red:#dc2626;--red-bg:#fef2f2;
  --orange:#ea580c;--orange-bg:#fff7ed;
  --green:#16a34a;--green-bg:#f0fdf4;
  --warn:#d97706;--warn-bg:#fffbeb;
  --r:10px;--rs:6px;
}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px}
.hdr{background:var(--surf);border-bottom:1px solid var(--brd);padding:0 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px;padding:6px 0;flex-shrink:0}
.logo img{height:36px;width:auto}
.logo-txt{font-family:"Syne",sans-serif;font-weight:800;font-size:14px;line-height:1.1;color:#1e293b}
.logo-txt small{font-weight:600;font-size:12px;color:var(--muted)}
.tabs{display:flex;gap:0;overflow-x:auto}
.tb{background:none;border:none;border-bottom:2px solid transparent;padding:14px 12px 12px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap}
.tb:hover{color:var(--txt)}.tb.on{color:var(--acc);border-bottom-color:var(--acc)}
.sind{font-size:11px;color:var(--green);padding:0 6px;opacity:0;transition:opacity .4s;flex-shrink:0}
.pg{display:none;padding:16px}.pg.on{display:block}
.stitle{font-family:"Syne",sans-serif;font-weight:700;font-size:18px;margin-bottom:16px}
.arow{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.arow input,.arow select{flex:1;min-width:120px;height:36px;border:1px solid var(--brd2);border-radius:var(--rs);padding:0 10px;font-family:"DM Sans",sans-serif;font-size:13px;background:var(--surf);color:var(--txt);outline:none}
.arow input:focus,.arow select:focus{border-color:var(--acc)}
.btn{height:36px;padding:0 14px;border-radius:var(--rs);border:1px solid var(--brd2);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;cursor:pointer;background:var(--surf);color:var(--txt);white-space:nowrap;flex-shrink:0}
.btn:hover{background:var(--s2)}.btn-p{background:var(--acc);color:#fff;border-color:var(--acc)}.btn-p:hover{opacity:.88}
.btn-o{background:var(--orange-bg);color:var(--orange);border-color:#fed7aa}
.ilist{display:flex;flex-direction:column;gap:7px}
.icard{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px}
.icard-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.icard-info{flex:1;min-width:0}
.icard-name{font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icard-sub{font-size:11px;color:var(--muted)}
.bico{width:28px;height:28px;border-radius:var(--rs);border:1px solid var(--brd);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted)}
.bico:hover{background:var(--red-bg);color:var(--red);border-color:#fca5a5}
/* PLANNING */
.ptool{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.ptool input[type=date],.ptool input[type=number]{height:34px;border:1px solid var(--brd2);border-radius:var(--rs);padding:0 8px;font-size:13px;background:var(--surf);color:var(--txt);outline:none}
.wlbl{font-family:"Syne",sans-serif;font-weight:700;font-size:13px}
.twrap{overflow-x:auto;background:var(--surf);border:1px solid var(--brd);border-radius:var(--r)}
.ptable{border-collapse:collapse;width:100%;table-layout:fixed}
.ptable td:first-child,.ptable th:first-child{width:105px;min-width:105px;max-width:105px;overflow:hidden}
.ptable td:not(:first-child),.ptable th:not(:first-child){width:120px;min-width:120px;max-width:120px;overflow:hidden}
.ptable th,.ptable td{border:1px solid var(--brd);vertical-align:top}
.th-corner{width:130px;min-width:130px;background:#e2e8f0;padding:10px;font-family:"Syne",sans-serif;font-weight:700;font-size:11px;text-align:center;color:#334155;position:sticky;left:0;z-index:30;text-transform:uppercase;letter-spacing:.06em}
.th-day{width:120px;min-width:120px;max-width:120px;padding:0;text-align:center}
.th-day-inner{padding:8px 10px}
.th-dn{font-family:"Syne",sans-serif;font-weight:800;font-size:13px}
.th-dd{font-size:10px;margin-top:1px;opacity:.85}
.th-day-0 .th-day-inner{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff}
.th-day-1 .th-day-inner{background:linear-gradient(135deg,#0891b2,#0e7490);color:#fff}
.th-day-2 .th-day-inner{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff}
.th-day-3 .th-day-inner{background:linear-gradient(135deg,#d97706,#b45309);color:#fff}
.th-day-4 .th-day-inner{background:linear-gradient(135deg,#db2777,#be185d);color:#fff}
.td-label{background:#e2e8f0;position:sticky;left:0;z-index:5;border-right:2px solid #475569;padding:0;vertical-align:middle}
.td-label-inner{width:105px;max-width:105px;min-width:105px;overflow:hidden;display:block;box-sizing:border-box;word-break:break-word;white-space:normal}
.lbtn{width:105px;max-width:105px;min-height:46px;padding:4px 6px;background:none;border:none;cursor:pointer;text-align:left;font-family:"DM Sans",sans-serif;display:flex;flex-direction:column;justify-content:center;gap:1px;overflow:hidden;box-sizing:border-box}
.lbtn:hover{background:rgba(71,85,105,.1)}
.lname{font-family:"Syne",sans-serif;font-weight:700;font-size:11px;color:#1e293b;display:flex;align-items:center;gap:4px;overflow:hidden;white-space:normal;word-break:break-word}
.lref{font-size:10px;color:#475569;white-space:normal;word-break:break-word}.laddr{font-size:9px;color:#64748b;white-space:normal;word-break:break-word}
.lph{font-size:11px;color:#94a3b8;font-style:italic}
.ldup{font-size:9px;color:var(--red);background:var(--red-bg);border-radius:3px;padding:1px 4px;font-weight:600;margin-top:2px}
.ch-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* SPECIAL ROWS */
.td-label.liv-l{background:#fefce8}.td-label.ua-l{background:#f0f9ff}
.td-label.abs-l{background:#fff7ed}.td-label.depot-l{background:var(--green-bg)}.td-label.ind-l{background:#fdf2f8}
.spec-lbl{font-family:"Syne",sans-serif;font-weight:700;font-size:10px;padding:8px;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:4px}
.spec-lbl.liv{color:#a16207}.spec-lbl.ua{color:#0369a1}.spec-lbl.abs{color:var(--orange)}.spec-lbl.depot{color:var(--green)}.spec-lbl.ind{color:#be185d}
/* DATA CELL */
.td-data{padding:3px;vertical-align:top;overflow:hidden;max-width:80px}
.td-day-0{border-top:2px solid #7c3aed!important}.td-day-1{border-top:2px solid #0891b2!important}
.td-day-2{border-top:2px solid #16a34a!important}.td-day-3{border-top:2px solid #d97706!important}
.td-day-4{border-top:2px solid #db2777!important}
.cell-c{display:flex;flex-direction:column;gap:3px;min-height:44px;padding:3px;border-radius:5px;transition:background .1s}
.cell-c.dov{background:var(--acc-bg)!important;outline:2px dashed var(--acc)}
.cell-c.dov-bad{background:var(--red-bg)!important;outline:2px dashed var(--red)}
/* CHIPS */
.ua-chip{display:inline-flex;align-items:center;gap:5px;background:#e5e7eb;border:1px solid #d1d5db;border-radius:5px;padding:4px 8px;font-size:12px;font-weight:500;cursor:grab;user-select:none;color:#374151;transition:opacity .1s;width:fit-content}
.ua-chip:active{cursor:grabbing}.ua-chip.dragging{opacity:.3}
/* CELL CHIP */
.chip-wrap{display:flex;align-items:center;gap:2px;background:#dbeafe;border:1px solid #93c5fd;border-radius:6px;width:100%;overflow:hidden;transition:border-color .1s;padding:2px 4px;box-sizing:border-box}
.chip-wrap:hover{border-color:var(--brd2)}
.chip-wrap.c-abs{background:var(--orange-bg);border-color:#fed7aa}
.chip-wrap.c-conf{background:var(--red-bg);border-color:#fca5a5}
.chip-wrap.c-dup{background:var(--warn-bg);border-color:#fcd34d}
.chip-top{display:flex;align-items:center;gap:4px;flex:1;min-width:0;user-select:none}
.chip-wrap.picked{opacity:.5}
.chip-wrap.c-bday{background:linear-gradient(135deg,#fef9c3,#fde68a);border-color:#f59e0b;box-shadow:0 0 6px rgba(245,158,11,.4)}
.chip-wrap.c-apprenti{background:#dcfce7;border-color:#86efac}
.chip-wrap.c-liv{background:#fff7ed;border-color:#fb923c;border-width:2px}
.bday-banner{display:flex;align-items:center;justify-content:center;gap:4px;background:linear-gradient(90deg,#f59e0b,#f97316);color:#fff;font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;margin-top:2px;letter-spacing:.03em;animation:bdaypulse 1.5s infinite}
.chip-handle{display:flex;align-items:center;justify-content:center;width:14px;min-width:14px;cursor:ew-resize;color:#94a3b8;font-size:10px;padding:0 1px;border-left:1px solid #bfdbfe;margin-left:2px;user-select:none;flex-shrink:0}
.chip-handle:hover{color:#2563eb;background:#eff6ff;border-radius:0 4px 4px 0}
.drag-clone{position:fixed;pointer-events:none;z-index:9999;opacity:.85;background:var(--surf);border:2px solid var(--acc);border-radius:6px;padding:3px 8px;font-size:12px;font-weight:500;color:var(--txt);display:flex;align-items:center;gap:5px;box-shadow:0 4px 12px rgba(0,0,0,.15);white-space:nowrap}
.ua-chip.picked{opacity:.5}
.cell-c.drop-ok{outline:2px solid var(--acc)!important;background:var(--acc-bg)!important}
.cell-c.drop-bad{outline:2px solid var(--red)!important;background:var(--red-bg)!important}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;font-weight:500;min-width:0}
.cico{font-size:11px;flex-shrink:0}
.crm{font-size:13px;color:var(--dim);cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;background:none;border:none;font-family:inherit}
.crm:hover{color:var(--red)}
/* VEH BUTTON inline at end of chip */
.chip-veh{display:inline-flex;align-items:center;gap:1px;padding:1px 4px;font-size:10px;font-weight:600;cursor:pointer;background:#e0f2fe;border:none;border-radius:4px;font-family:"DM Sans",sans-serif;color:#0369a1;flex-shrink:0;margin-left:auto;height:auto;transition:background .1s;white-space:nowrap}
.chip-veh:hover{background:rgba(0,0,0,.06)}
.chip-veh.has-veh{color:var(--txt)}
.chip-veh .vdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chip-veh.vok .vdot{background:var(--green)}.chip-veh.vwarn .vdot{background:var(--warn)}.chip-veh.vlate .vdot{background:var(--red)}.chip-veh.vnone .vdot{background:var(--dim)}
/* VEH DROPDOWN */
.vdrop{display:none;position:absolute;z-index:50;background:var(--surf);border:1px solid var(--brd2);border-radius:var(--r);box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:240px;max-width:280px;overflow:hidden}
.vdrop.on{display:block}
.vdrop-header{padding:8px 12px 6px;border-bottom:1px solid var(--brd);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.vdrop-list{max-height:200px;overflow-y:auto}
.vdrop-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:12px;transition:background .1s}
.vdrop-item:hover{background:var(--acc-bg)}
.vdrop-item.on{background:var(--acc-bg);font-weight:500}
.vdrop-item.asgd{background:var(--orange-bg)}
.vdrop-asgd{font-size:9px;color:var(--orange);background:#ffedd5;border-radius:3px;padding:1px 5px;margin-left:auto;white-space:nowrap;flex-shrink:0}
.vdrop-none{padding:8px 12px;border-top:1px solid var(--brd);cursor:pointer;font-size:11px;color:var(--muted);font-style:italic}
.vdrop-none:hover{background:var(--s2)}
/* INLINE PICKER */
.ipick{background:var(--surf);border:1px solid var(--brd2);border-radius:var(--r);padding:8px;margin-top:4px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.ipick-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.isearch{width:100%;height:28px;border:1px solid var(--brd2);border-radius:var(--rs);padding:0 8px;font-size:12px;background:var(--bg);color:var(--txt);outline:none;font-family:"DM Sans",sans-serif;margin-bottom:5px}
.isearch:focus{border-color:var(--acc)}
.ilist2{display:flex;flex-direction:column;gap:1px;max-height:150px;overflow-y:auto}
.iitem{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:var(--rs);cursor:pointer;font-size:12px}
.iitem:hover{background:var(--acc-bg);color:var(--acc)}
.iitem.dis{opacity:.45;cursor:default}.iitem.dis:hover{background:none;color:inherit}
.iitem-sep{height:1px;background:var(--brd);margin:3px 0}
.iitem-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);padding:3px 7px;font-weight:500}
.idot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.addbtn{display:flex;align-items:center;gap:3px;background:none;border:1px dashed var(--brd2);border-radius:5px;padding:3px 8px;font-size:11px;color:var(--dim);cursor:pointer;width:100%;font-family:"DM Sans",sans-serif}
.addbtn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-bg)}
.liv-chip{display:flex;align-items:center;gap:4px;background:var(--warn-bg);border:1px solid #fcd34d;border-radius:5px;padding:3px 7px;font-size:11px;color:var(--warn)}
.liv-add{display:flex;align-items:center;gap:3px;background:none;border:1px dashed #fcd34d;border-radius:5px;padding:3px 8px;font-size:11px;color:var(--warn);cursor:pointer;width:100%;font-family:"DM Sans",sans-serif}
.depot-chip{display:flex;align-items:center;gap:4px;background:var(--green-bg);border:1px solid #86efac;border-radius:5px;padding:3px 8px;font-size:11px;font-weight:500;color:var(--green);cursor:grab;user-select:none}
.depot-chip.warn{background:var(--warn-bg);border-color:#fcd34d;color:var(--warn)}
.depot-chip.late{background:var(--red-bg);border-color:#fca5a5;color:var(--red)}
.depot-chip.dragging{opacity:.3}
.st-chip{display:flex;align-items:center;gap:5px;border-radius:5px;padding:3px 8px;font-size:11px;font-weight:500}
.st-chip.ab{background:var(--orange-bg);border:1px solid #fed7aa;color:var(--orange)}
.ind-chip{display:flex;align-items:center;gap:5px;background:#fdf2f8;border:1px solid #f9a8d4;border-radius:5px;padding:3px 8px;font-size:11px;color:#9d174d}
.ind-add{display:flex;align-items:center;gap:3px;background:none;border:1px dashed #f9a8d4;border-radius:5px;padding:3px 8px;font-size:11px;color:#be185d;cursor:pointer;width:100%;font-family:"DM Sans",sans-serif}
/* DROPDOWNS */
.dov{position:fixed;inset:0;z-index:200;display:none}.dov.on{display:block}
.dpop{position:fixed;background:var(--surf);border:1px solid var(--brd2);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.12);width:260px;z-index:201;overflow:hidden;display:none}.dpop.on{display:block}
.dsearch{padding:7px;border-bottom:1px solid var(--brd)}.dsearch input{width:100%;height:30px;border:1px solid var(--brd2);border-radius:var(--rs);padding:0 8px;font-size:12px;outline:none;background:var(--bg);color:var(--txt);font-family:"DM Sans",sans-serif}
.dlist{max-height:220px;overflow-y:auto}
.ditem{display:flex;align-items:center;gap:7px;padding:7px 10px;cursor:pointer;font-size:12px}.ditem:hover{background:var(--acc-bg)}.ditem.sel{background:var(--acc-bg);font-weight:500}
.ddiv{height:1px;background:var(--brd);margin:3px 0}.dempty{padding:12px;font-size:12px;color:var(--muted);text-align:center}
/* COLOR PICKER */
.cpick{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.csw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.csw.on{border-color:var(--txt)}
/* ABS */
.abs-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.abs-badge{display:inline-flex;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:500}
.abs-badge.conge{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.abs-badge.rtt{background:var(--acc-bg);color:#1d4ed8;border:1px solid #93c5fd}
.abs-badge.maladie{background:var(--warn-bg);color:#92400e;border:1px solid #fde68a}
.abs-badge.autre{background:var(--s2);color:var(--muted);border:1px solid var(--brd)}
/* VEH TABLE */
.veh-table{width:100%;border-collapse:collapse;background:var(--surf);border-radius:var(--r);overflow:hidden;border:1px solid var(--brd)}
.veh-table th{background:#e2e8f0;color:#334155;font-family:"Syne",sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;text-align:left;border-bottom:2px solid #94a3b8}
.veh-table td{padding:7px 10px;border-bottom:1px solid var(--brd);font-size:12px;vertical-align:middle}
.veh-table tr:last-child td{border-bottom:none}
.vbadge{display:inline-block;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:600}
.vbadge.ok{background:#dcfce7;color:#166534}.vbadge.soon{background:var(--warn-bg);color:#854d0e}.vbadge.late{background:var(--red-bg);color:#991b1b}.vbadge.none{background:var(--s2);color:var(--dim)}
.rdv-entry{display:flex;align-items:center;gap:4px;background:var(--acc-bg);border:1px solid #bae6fd;border-radius:3px;padding:2px 6px;font-size:10px;color:#0369a1;margin-bottom:2px}
.rdv-rm{cursor:pointer;margin-left:auto;font-size:11px}
.rdv-add-btn{height:24px;padding:0 8px;font-size:10px;background:none;border:1px dashed #bae6fd;border-radius:3px;color:var(--acc);cursor:pointer;font-family:"DM Sans",sans-serif}
.done-wrap{display:flex;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;font-size:11px;font-weight:500;user-select:none;padding:0 3px}
.done-wrap input{width:13px;height:13px;cursor:pointer;accent-color:var(--green)}
.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.4}
.toast{position:fixed;bottom:16px;right:16px;background:#1e293b;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.3);opacity:0;transition:opacity .3s;pointer-events:none}
.toast.on{opacity:1}
@keyframes bdaypulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.85;transform:scale(1.03)}}
</style>
</head>
<body>

function loadFromCloud(cb){
  fetch(GH_API, {
    headers: {
      "Authorization": "token "+GH_TOKEN,
      "Accept": "application/vnd.github.v3+json"
    }
  })
  .then(function(r){
    if(r.status===404){
      // File doesn't exist yet — create it
      console.log("data.json not found, creating...");
      if(cb)cb();
      return null;
    }
    return r.json();
  })
  .then(function(data){
    if(!data){return;}
    if(data.content){
      _ghSha = data.sha;
      var b64 = data.content.split("\n").join("");
      var json = decodeURIComponent(escape(atob(b64)));
      var remote = JSON.parse(json);
      if(remote){
        D = remote;
        ["chantiers","salaries","absences","vehicules","formations","rdvs"].forEach(function(k){if(!D[k])D[k]=[];});
        ["cells","rowChantiers","livraisons","vehAssign","vehIndispo"].forEach(function(k){if(!D[k])D[k]={};});
        if(!D.pointages)D.pointages={};
        if(!D.grille)D.grille={trajet:{},transport:{}};
        localStorage.setItem(SK, JSON.stringify(D));
        // Update version display
        var now=new Date();
        _savedAt=now.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})+" à "+String(now.getHours()).padStart(2,"0")+"h"+String(now.getMinutes()).padStart(2,"0");
        var v=document.getElementById("ver-display");
        if(v){v.textContent="☁️ Chargé le "+_savedAt;v.style.color="#0891b2";}
      }
    }
    if(cb)cb();
  })
  .catch(function(e){
    console.log("GitHub load error:", e);
    var local = localStorage.getItem(SK);
    if(local){ try{ D = JSON.parse(local); }catch(ex){} }
    if(cb)cb();
  });
}

function save(){
  // Always save to localStorage immediately
  localStorage.setItem(SK, JSON.stringify(D));
  // Debounce GitHub save
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function(){
    var ind=document.getElementById("sind");
    if(ind){ind.textContent="☁️ Sync...";ind.style.opacity="1";}
    // Compress: remove empty/null values to reduce size
    var json = JSON.stringify(D, function(key, val){
      if(val===null||val===undefined)return undefined;
      if(typeof val==="object"&&!Array.isArray(val)){
        var hasContent=false;
        for(var k in val){if(val[k]!==null&&val[k]!==undefined&&val[k]!==""){hasContent=true;break;}}
        if(!hasContent&&key!=="")return undefined;
      }
      if(val==="")return undefined;
      return val;
    });
    var encoded = btoa(unescape(encodeURIComponent(json)));
    var body = {message:"Update planning data",content:encoded};
    if(_ghSha) body.sha = _ghSha;
    fetch(GH_API, {
      method: "PUT",
      headers: {
        "Authorization": "token "+GH_TOKEN,
        "Accept": "application/vnd.github.v3+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.content) _ghSha = data.content.sha;
      var now=new Date();
      var readable=now.toLocaleDateString("fr-FR",{day:"numeric",month:"long"})+" à "+String(now.getHours()).padStart(2,"0")+"h"+String(now.getMinutes()).padStart(2,"0");
      var ind2=document.getElementById("sind");
      if(ind2){ind2.textContent="✅ Sync GitHub";ind2.style.opacity="1";clearTimeout(ind2._t);ind2._t=setTimeout(function(){ind2.style.opacity="0";},3000);}
      var v=document.getElementById("ver-display");
      if(v){v.textContent="☁️ Sync "+readable;v.style.color="#0891b2";}
    })
    .catch(function(e){
      console.log("GitHub save error:", e);
      var ind3=document.getElementById("sind");
      if(ind3){ind3.textContent="⚠️ Erreur sync";ind3.style.opacity="1";}
    });
  }, 2000);
}

function importJSON(ev){
  var file=ev.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.chantiers||!data.salaries){alert("Fichier invalide.");return;}
      if(!confirm("Remplacer toutes les données par cette sauvegarde ?"))return;
      D=data;
      ["chantiers","salaries","absences","vehicules"].forEach(function(k){if(!D[k])D[k]=[];});
      ["cells","rowChantiers","livraisons","vehAssign","vehIndispo"].forEach(function(k){if(!D[k])D[k]={};});
      save();RP();RC();RS();RA();RV();RF();RRDV();RANALYSE();RGANTT();RPOINTAGE();RINDEM();
    }catch(err){alert("Fichier invalide: "+err.message);}
  };

}

function pd(s){if(!s)return new Date();var p=s.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]);}
function ds(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function getMon(d){var dt=new Date(d.getFullYear(),d.getMonth(),d.getDate());var day=dt.getDay();dt.setDate(dt.getDate()-(day===0?6:day-1));return dt;}
function wd(w){var m=pd(w);return Array.from({length:5},function(_,i){return new Date(m.getFullYear(),m.getMonth(),m.getDate()+i);});}
function fmd(d){return d.toLocaleDateString("fr-FR",{day:"numeric",month:"short"});}
function fmw(w){var d=wd(w);return "Sem. du "+d[0].toLocaleDateString("fr-FR",{day:"numeric",month:"long"})+" au "+d[4].toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});}

function nextWeek(){var d=pd(CW);d.setDate(d.getDate()+7);sw(ds(d));}

function getNR(){return Math.max(1,Math.min(30,parseInt(document.getElementById("nbrows").value)||6));}
function isAbs(sId,di){
  var d=wd(CW)[di];
  var inAbs=D.absences.some(function(a){return a.salId===sId&&pd(a.debut)<=d&&d<=pd(a.fin);});
  if(inAbs)return true;
  // Check formations
  var inForm=(D.formations||[]).some(function(f){return f.salId===sId&&f.nextdeb&&f.nextfin&&pd(f.nextdeb)<=d&&d<=pd(f.nextfin);});
  return inForm;
}
function allAbsDay(di){var d=wd(CW)[di];var seen={};var r=[];D.absences.forEach(function(a){if(pd(a.debut)<=d&&d<=pd(a.fin)){var s=D.salaries.find(function(x){return x.id===a.salId;});if(s&&!seen[s.id]){seen[s.id]=1;r.push(Object.assign({},s,{absType:a.type}));}}});(D.formations||[]).forEach(function(f){if(f.nextdeb&&f.nextfin&&pd(f.nextdeb)<=d&&d<=pd(f.nextfin)){var s=D.salaries.find(function(x){return x.id===f.salId;});if(s&&!seen[s.id]){seen[s.id]=1;r.push(Object.assign({},s,{absType:"formation"}));}}});return r;}
function isAssDay(sId,di){var n=getNR();for(var r=0;r<n;r++)if((D.cells[CW+"|"+r+"|"+di]||[]).indexOf(sId)>=0)return true;return false;}
function getConf(sId,di,excKey){var n=getNR();var r=[];for(var i=0;i<n;i++){var ck=CW+"|"+i+"|"+di;if(ck!==excKey&&(D.cells[ck]||[]).indexOf(sId)>=0){var ch=GRC(CW+"|"+i);r.push(ch?ch.nom:"Ch."+(i+1));}}return r;}
function unasgDay(di){
  var ab={};allAbsDay(di).forEach(function(s){ab[s.id]=1;});
  // Exclude Benoist if he has a livraison this day
  var livKey=CW+"|liv|"+di;
  var hasLiv=(D.livraisons[livKey]||[]).length>0;
  return D.salaries.filter(function(s){
    if(ab[s.id]||isAssDay(s.id,di))return false;
    // Hide Benoist from non-affectés if livraison ce jour
    if(hasLiv&&(s.nom||"").toUpperCase()==="NICOLAS"&&(s.prenom||"").toUpperCase()==="BENOIST")return false;
    return true;
  });
}
function GRC(rk){var v=D.rowChantiers[rk];if(!v)return null;if(typeof v==="string")return D.chantiers.find(function(c){return c.id===v;})||null;return v;}
function asgVehs(di){var n=getNR();var ids={};for(var r=0;r<n;r++){var ck=CW+"|"+r+"|"+di;(D.cells[ck]||[]).forEach(function(sid){var vid=D.vehAssign["va|"+ck+"|"+sid];if(vid)ids[vid]=1;});}return ids;}
function nxtD(last,mo){if(!last)return null;var d=new Date(last);d.setMonth(d.getMonth()+mo);return d;}
function vCS(veh){
  if(!veh)return null;
  var checks=[{n:nxtD(veh.vidange,12),l:"Vidange"},{n:nxtD(veh.ct,24),l:"CT"},{n:nxtD(veh.antipol,12),l:"Anti-pol."}];
  var w="ok";
  var dets=checks.map(function(c){
    if(!c.n)return{l:c.l,cls:"none",txt:"—"};
    var diff=Math.round((c.n-new Date())/86400000);
    var cls="ok",txt="OK";
    if(diff<0){cls="late";txt="Dépassé";w="late";}
    else if(diff<=60){cls="warn";txt="Dans "+diff+"j";if(w!=="late")w="warn";}
    return{l:c.l,cls:cls,txt:txt};
  });
  return{worst:w,dets:dets};
}

// ── DRAG STATE ──
var dSal=null,dFCell=null,dVeh=null,dVFrom=null;
var _clone=null,_pickedEl=null;

function _startSalDrag(salId,fromCk,el,e){
  dSal=salId;dFCell=fromCk;
  _pickedEl=el;el.classList.add("picked");
  var sal=D.salaries.find(function(s){return s.id===salId;});
  _clone=document.createElement("div");_clone.className="drag-clone";
  var nm=document.createElement("span");nm.textContent=sal?sal.prenom+(sal.nom?" "+sal.nom[0]+".":""):"?";_clone.appendChild(nm);
  _clone.style.left=(e.clientX-60)+"px";_clone.style.top=(e.clientY-16)+"px";
  document.body.appendChild(_clone);
  document.addEventListener("mousemove",_onMouseMove);
  document.addEventListener("mouseup",_onMouseUp);
  e.preventDefault();
}

function _onMouseMove(e){
  if(!_clone)return;
  _clone.style.left=(e.clientX-60)+"px";_clone.style.top=(e.clientY-16)+"px";
  // Highlight drop targets
  document.querySelectorAll(".cell-c[data-ck]").forEach(function(cc){
    var r=cc.getBoundingClientRect();
    var over=e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom;
    if(over){
      var di=parseInt(cc.dataset.ck.split("|")[2]);
      var bad=isAbs(dSal,di);
      cc.classList.toggle("drop-ok",!bad);
      cc.classList.toggle("drop-bad",bad);
    }else{cc.classList.remove("drop-ok","drop-bad");}
  });
}

function _onMouseUp(e){
  document.removeEventListener("mousemove",_onMouseMove);
  document.removeEventListener("mouseup",_onMouseUp);
  if(_clone){_clone.remove();_clone=null;}
  if(_pickedEl){_pickedEl.classList.remove("picked");_pickedEl=null;}
  document.querySelectorAll(".cell-c.drop-ok,.cell-c.drop-bad").forEach(function(cc){cc.classList.remove("drop-ok","drop-bad");});
  // Find target cell
  var target=null;
  document.querySelectorAll(".cell-c[data-ck]").forEach(function(cc){
    var r=cc.getBoundingClientRect();
    if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom)target=cc;
  });
  if(!target){dSal=null;dFCell=null;return;}
  var ck=target.dataset.ck;
  var di=parseInt(ck.split("|")[2]);
  var sid=dSal;var fromCk=dFCell;
  dSal=null;dFCell=null;
  if(!sid||isAbs(sid,di)){showToast("Ce salarié est absent ce jour.");return;}
  if((D.cells[ck]||[]).indexOf(sid)>=0){showToast("Ce salarié est déjà dans cette case.");return;}
  var conf=getConf(sid,di,ck);
  var sal=D.salaries.find(function(s){return s.id===sid;});
  if(conf.length&&!confirm((sal?sal.prenom+(sal.nom?" "+sal.nom:""):"?")+": déjà sur "+conf[0]+". Ajouter quand même ?"))return;
  _showMultiDayModal(sid,ck,fromCk,di,sal);
}

  });
  box.appendChild(dayRow);
  var btnRow=document.createElement("div");btnRow.style.cssText="display:flex;gap:8px";
  var okBtn=document.createElement("button");
  okBtn.style.cssText="flex:1;height:36px;background:#1a1916;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer";

  okBtn.onclick=function(){
    if(fromCk){D.cells[fromCk]=(D.cells[fromCk]||[]).filter(function(id){return id!==sid;});delete D.vehAssign["va|"+fromCk+"|"+sid];}
    DN2.forEach(function(d,i){
      if(!checkboxes[i].checked)return;
      var targetCk=parts[0]+"|"+row+"|"+i;
      if((D.cells[targetCk]||[]).indexOf(sid)<0){if(!D.cells[targetCk])D.cells[targetCk]=[];D.cells[targetCk].push(sid);}
      if(curVehId)D.vehAssign["va|"+targetCk+"|"+sid]=curVehId;
      // Set chantier start date if not already set
      var chId=D.rowChantiers[parts[0]+"|"+row];
      if(chId){var ch=D.chantiers.find(function(c){return c.id===chId;});
        if(ch&&!ch.dateDebut){
          var dates=wd(parts[0]);
          ch.dateDebut=dates[i].toISOString().split("T")[0];
        }
      }
    });
    // Auto-set dateDebut on chantier when first salarié assigned
    var chId=D.rowChantiers[parts[0]+"|"+row];
    if(chId){
      var chObj=D.chantiers.find(function(c){return c.id===chId;});
      if(chObj&&!chObj.dateDebut){

        var minDay=4;
        DN2.forEach(function(d,i){if(checkboxes[i]&&checkboxes[i].checked&&i<minDay)minDay=i;});
        var dates=wd(parts[0]);

  btnRow.appendChild(okBtn);btnRow.appendChild(cancelBtn);box.appendChild(btnRow);
  modal.appendChild(box);document.body.appendChild(modal);
  modal.onclick=function(e){if(e.target===modal)modal.remove();};
}

// ── STRETCH (poignée multi-jours) ──
var _stretching=false,_stretchSid=null,_stretchCk=null,_stretchClone=null;

function _startStretch(sid,ck,e){
  _stretching=true;_stretchSid=sid;_stretchCk=ck;
  _stretchClone=document.createElement("div");
  _stretchClone.style.cssText="position:fixed;pointer-events:none;background:#2563eb;color:#fff;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;z-index:9999;display:flex;align-items:center;gap:6px";
  var sal=D.salaries.find(function(s){return s.id===sid;});
  _stretchClone.textContent="↔ "+( sal?sal.prenom:"?");
  _stretchClone.style.left=(e.clientX+10)+"px";_stretchClone.style.top=(e.clientY-16)+"px";
  document.body.appendChild(_stretchClone);
  // Highlight all cells in same row
  document.querySelectorAll(".cell-c[data-ck]").forEach(function(cc){
    var parts=cc.dataset.ck.split("|");
    var srcParts=ck.split("|");
    if(parts[0]===srcParts[0]&&parts[1]===srcParts[1]) cc.classList.add("drop-ok");
  });
  document.addEventListener("mousemove",_onStretchMove);
  document.addEventListener("mouseup",_onStretchUp);
}

function _onStretchMove(e){
  if(!_stretching||!_stretchClone)return;
  _stretchClone.style.left=(e.clientX+10)+"px";_stretchClone.style.top=(e.clientY-16)+"px";
  // Highlight hovered cell
  document.querySelectorAll(".cell-c.drop-ok,.cell-c.stretch-hover").forEach(function(cc){cc.classList.remove("stretch-hover");});
  document.querySelectorAll(".cell-c[data-ck]").forEach(function(cc){
    var r=cc.getBoundingClientRect();
    var over=e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom;
    if(over) cc.classList.add("stretch-hover");
  });
}

function _onStretchUp(e){
  document.removeEventListener("mousemove",_onStretchMove);
  document.removeEventListener("mouseup",_onStretchUp);
  if(_stretchClone){_stretchClone.remove();_stretchClone=null;}
  document.querySelectorAll(".cell-c.drop-ok,.cell-c.stretch-hover").forEach(function(cc){cc.classList.remove("drop-ok","stretch-hover");});
  if(!_stretching){_stretching=false;return;}
  _stretching=false;

  // Find target cell
  var target=null;
  document.querySelectorAll(".cell-c[data-ck]").forEach(function(cc){
    var r=cc.getBoundingClientRect();
    if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom) target=cc;
  });
  if(!target||target.dataset.ck===_stretchCk){_stretchSid=null;_stretchCk=null;return;}

  var srcParts=_stretchCk.split("|");
  var tgtParts=target.dataset.ck.split("|");
  // Must be same row
  if(srcParts[0]!==tgtParts[0]||srcParts[1]!==tgtParts[1]){showToast("Glissez sur la même ligne.");_stretchSid=null;_stretchCk=null;return;}

  var srcDay=parseInt(srcParts[2]);
  var tgtDay=parseInt(tgtParts[2]);
  var minDay=Math.min(srcDay,tgtDay);var maxDay=Math.max(srcDay,tgtDay);
  var curVehId=D.vehAssign["va|"+_stretchCk+"|"+_stretchSid]||null;
  var sid=_stretchSid;var ckBase=srcParts[0]+"|"+srcParts[1]+"|";

  for(var d=minDay;d<=maxDay;d++){
    var targetCk=ckBase+d;
    if((D.cells[targetCk]||[]).indexOf(sid)<0){
      if(!D.cells[targetCk])D.cells[targetCk]=[];
      D.cells[targetCk].push(sid);
    }
    if(curVehId)D.vehAssign["va|"+targetCk+"|"+sid]=curVehId;
  }
  // Set chantier start date if first assignment
  var srcP=_stretchCk.split("|");
  var chId2=D.rowChantiers[srcP[0]+"|"+srcP[1]];
  if(chId2){var ch2=D.chantiers.find(function(c){return c.id===chId2;});
    if(ch2&&!ch2.dateDebut){var dates2=wd(srcP[0]);ch2.dateDebut=dates2[minDay].toISOString().split("T")[0];}
  }
  _stretchSid=null;_stretchCk=null;
  save();RP();RC();
}

      tdBday.textContent=(isBday?"🎂 ":"")+ddnDate.toLocaleDateString("fr-FR",{day:"numeric",month:"long"});

function nD(last,mo){if(!last)return "";var d=new Date(last);d.setMonth(d.getMonth()+mo);return ds(d);}
function vStat(next){if(!next)return{cls:"none",b:"—",tip:"—"};var diff=Math.round((pd(next)-new Date())/86400000);if(diff<0)return{cls:"late",b:"Dépassé",tip:"Dépassé de "+(-diff)+" j"};if(diff<=60)return{cls:"soon",b:"Dans "+diff+"j",tip:diff+" j"};return{cls:"ok",b:"OK",tip:"OK"};}
function syncRdv(){Object.keys(D.vehIndispo).forEach(function(k){if(D.vehIndispo[k].fromRdv)delete D.vehIndispo[k];});D.vehicules.forEach(function(v){(v.rdvs||[]).forEach(function(rdv){var d=pd(rdv.date),dw=d.getDay();if(dw===0||dw===6)return;var ms=ds(getMon(d)),di=dw-1;D.vehIndispo[ms+"|"+di+"|"+v.id]={reason:"garage",note:rdv.type==="vidange"?"Vidange":rdv.type==="ct"?"CT":rdv.type==="antipol"?"Anti-pol.":"Rdv garage",fromRdv:true};});});save();}
function addRdv(vId,type,date,note){var v=D.vehicules.find(function(x){return x.id===vId;});if(!v)return;if(!v.rdvs)v.rdvs=[];v.rdvs.push({id:"rdv_"+Date.now(),type:type,date:date,note:note});syncRdv();RV();}
function delRdv(vId,rId){var v=D.vehicules.find(function(x){return x.id===vId;});if(!v)return;v.rdvs=(v.rdvs||[]).filter(function(r){return r.id!==rId;});syncRdv();RV();}

function XCSV(){
  var nb=getNR(),dates=wd(CW);
  var rows=[["Chantier"].concat(DN.map(function(n,i){return n+" "+fmd(dates[i]);}))];
  for(var r=0;r<nb;r++){
    var ch=GRC(CW+"|"+r);
    var lbl=ch?((ch.ref?ch.ref+" - ":"")+ch.nom):"Chantier "+(r+1);
    var row=[lbl];
    for(var d=0;d<5;d++){
      var ids=D.cells[CW+"|"+r+"|"+d]||[];
      row.push(ids.map(function(id){var s=D.salaries.find(function(x){return x.id===id;});return s?s.prenom+(s.nom?" "+s.nom:""):"";}).filter(Boolean).join(", "));
    }
    rows.push(row);
  }
  var csv=rows.map(function(row){return row.map(function(v){return '"'+(v||"").replace(/"/g,'""')+'"';}).join(";");}).join("\n");
  var a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"}));a.download="fonteneau_"+CW+".csv";a.click();
}

var PROFILES = {
  bureau: { name: "Bureau", pin: "@@@@", color: "#db2777", tabs: ["planning","rdv","chantiers","salaries","absences","vehicules","formation","pointage","indemnites"], readOnly: false },

};
var _currentProfile = null;

function applyProfile(key) {
  _currentProfile = key;
  var p = PROFILES[key];
  localStorage.setItem("current_profile", key);

  // Update avatar button
  var av = document.getElementById("profile-avatar");
  var nm = document.getElementById("profile-name");
  if(av){ av.textContent = p.name[0]; av.style.background = p.color; }
  if(nm) nm.textContent = p.name;

  // Show/hide tabs
  document.querySelectorAll(".tb").forEach(function(btn){
    var onclick = btn.getAttribute("onclick") || "";
    var match = onclick.match(/TAB\('([^']+)'\)/);
    var tabName = match ? match[1] : null;
    if(tabName){
      var allowed = p.tabs.indexOf(tabName) >= 0;
      btn.style.display = allowed ? "" : "none";
    }
  });

  // If current visible page not allowed, switch to first allowed tab
  var activePg = document.querySelector(".pg.on");
  if(activePg){
    var pgName = activePg.id.replace("pg-","");
    if(p.tabs.indexOf(pgName) < 0) TAB(p.tabs[0]);
  }

  // Lock/unlock planning for Chantier (read-only)
  var isReadOnly = p.readOnly;
  var planningPg = document.getElementById("pg-planning");
  if(planningPg){
    var inputs = planningPg.querySelectorAll("input,select,button:not([onclick*='TAB'])");
    inputs.forEach(function(el){ el.disabled = isReadOnly; });
    // Disable drag on cells
    planningPg.style.pointerEvents = isReadOnly ? "none" : "";
    // Re-enable navigation buttons
    var navBtns = planningPg.querySelectorAll("button");
    navBtns.forEach(function(el){ el.disabled = false; });
  }

  // Lock management tabs for Chantier
  ["chantiers","salaries","absences","vehicules"].forEach(function(tab){
    var pg = document.getElementById("pg-"+tab);
    if(!pg) return;
    var inputs = pg.querySelectorAll("input,select,button");
    inputs.forEach(function(el){ el.disabled = isReadOnly; });
  });

  // WhatsApp button visible only for Chantier
  var waBtn = document.querySelector("[onclick='showWhatsAppModal()']");
  if(waBtn) waBtn.style.display = isReadOnly ? "" : "none";

  // Notification bell visible only for Bureau
  var notifBtn = document.getElementById("notif-btn");
  if(notifBtn){
    notifBtn.style.display = !isReadOnly ? "flex" : "none";
    if(!isReadOnly) updateNotifBadge();
  }
  // GitHub token button for Bureau only
  var ghBtn = document.getElementById("gh-token-btn");
  if(ghBtn) ghBtn.style.display = !isReadOnly ? "flex" : "none";
}

    try{
      var hash=w.location.hash;
      if(hash&&hash.indexOf("access_token")>=0){
        clearInterval(poll);w.close();
        var params={};hash.substring(1).split("&").forEach(function(p){var kv=p.split("=");params[kv[0]]=decodeURIComponent(kv[1]||"");});
        _odToken=params.access_token;
        var exp=parseInt(params.expires_in||3600);
        setTimeout(function(){_odToken=null;},exp*1000);
        if(cb)cb();
      }
    }catch(e){}
    if(w.closed){clearInterval(poll);}
  },500);
}

function _uploadToOD(manual){
  var btn=document.getElementById("btn-onedrive");
  if(btn){btn.textContent="☁️ Upload…";btn.style.opacity=".7";}
  var src=document.documentElement.outerHTML;
  var now=new Date();
  var readableDate=now.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+" à "+String(now.getHours()).padStart(2,"0")+"h"+String(now.getMinutes()).padStart(2,"0");
  src=src.replace(/\/\*DATA_START\*\/.*?\/\*DATA_END\*\//,"/*DATA_START*/var D="+JSON.stringify(D)+";/*DATA_END*/");
  src=src.replace(/\/\*VER_START\*\/.*?\/\*VER_END\*\//,'/*VER_START*/var _savedAt="'+readableDate+'";/*VER_END*/');
  var blob=new Blob([src],{type:"text/html;charset=utf-8"});
  var filename="fonteneau_planning.html";
  var folderPath=OD_FOLDER?"/drive/root:/"+OD_FOLDER+"/"+filename+":/content":"/drive/root:/"+filename+":/content";
  fetch("https://graph.microsoft.com/v1.0/me"+folderPath,{
    method:"PUT",
    headers:{"Authorization":"Bearer "+_odToken,"Content-Type":"text/html; charset=utf-8"},
    body:blob
  }).then(function(r){
    if(r.status===401){_odToken=null;if(manual)showToast("⚠️ Session expirée, reconnectez-vous");return;}
    if(!r.ok){throw new Error("HTTP "+r.status);}
    return r.json();
  }).then(function(data){
    if(!data)return;
    _lastSyncHash=_dataHash();
    if(btn){btn.textContent="☁️ Sync OneDrive";btn.style.opacity="1";}
    showToast("☁️ Synchronisé sur OneDrive !");
    var v=document.getElementById("ver-display");
    if(v){v.textContent="☁️ Sync OneDrive — "+readableDate;v.style.color="#0078d4";v.style.fontWeight="500";}
  }).catch(function(err){
    if(btn){btn.textContent="☁️ Sync OneDrive";btn.style.opacity="1";}
    if(manual)showToast("❌ Erreur sync : "+err.message);
  });
}

function _startAutoSync(){
  if(_autoSyncTimer)clearInterval(_autoSyncTimer);
  if(!OD_CLIENT_ID||!_odToken)return;
  _autoSyncTimer=setInterval(function(){
    if(!_odToken)return;
    var h=_dataHash();
    if(h!==_lastSyncHash)_doODSync(false);
  },5*60*1000); // toutes les 5 minutes
}

// ── NOTIFICATIONS ──
function getAlerts(){
  var alerts=[];
  var now=new Date();

  // Visites médicales
  D.salaries.forEach(function(sal){
    if(!sal.visite)return;
    var vDate=new Date(sal.visite);
    var next=new Date(vDate);
    var freq=sal.type==="apprenti"?1:2;
    next.setFullYear(next.getFullYear()+freq);
    var diff=Math.floor((next-now)/(1000*60*60*24));
    if(diff<60){
      alerts.push({
        type:"visite",
        icon:"🏥",
        urgent:diff<0,
        label:(sal.prenom+(sal.nom?" "+sal.nom:"")),
        msg:diff<0?"Visite médicale EXPIRÉE depuis "+Math.abs(diff)+"j":"Visite médicale dans "+diff+"j ("+next.toLocaleDateString("fr-FR")+")",
        color:diff<0?"#dc2626":"#d97706"
      });
    }
  });

  // Formations
  (D.formations||[]).forEach(function(f){
    if(f.renouv!=="oui"||!f.date)return;
    var fDate=new Date(f.date);
    var next=new Date(fDate);
    next.setFullYear(next.getFullYear()+(f.delai||1));
    var diff=Math.floor((next-now)/(1000*60*60*24));
    if(diff<60){
      var sal=D.salaries.find(function(s){return s.id===f.salId;});
      alerts.push({
        type:"formation",
        icon:"📚",
        urgent:diff<0,
        label:(sal?sal.prenom+(sal.nom?" "+sal.nom:""):"?")+" — "+f.nom,
        msg:diff<0?"Renouvellement EXPIRÉ depuis "+Math.abs(diff)+"j":"Renouvellement dans "+diff+"j ("+next.toLocaleDateString("fr-FR")+")",
        color:diff<0?"#dc2626":"#d97706"
      });
    }
  });

  // Véhicules (CT, vidange, antipollution)
  D.vehicules.forEach(function(veh){
    var checks=[
      {label:"CT N°"+veh.num,date:veh.ct},
      {label:"Vidange N°"+veh.num,date:veh.vidange},
      {label:"Antipollution N°"+veh.num,date:veh.antipol}
    ];
    checks.forEach(function(c){
      if(!c.date)return;
      var d=new Date(c.date);
      var diff=Math.floor((d-now)/(1000*60*60*24));
      if(diff<60){
        alerts.push({
          type:"vehicule",
          icon:"🚐",
          urgent:diff<0,
          label:c.label,
          msg:diff<0?"EXPIRÉ depuis "+Math.abs(diff)+"j":"Échéance dans "+diff+"j ("+d.toLocaleDateString("fr-FR")+")",
          color:diff<0?"#dc2626":"#d97706"
        });
      }
    });
  });

  // Sort: urgent first
  alerts.sort(function(a,b){return (b.urgent?1:0)-(a.urgent?1:0);});
  return alerts;
}

function updateNotifBadge(){
  var alerts=getAlerts();
  var badge=document.getElementById("notif-badge");
  if(!badge)return;
  if(alerts.length){badge.textContent=alerts.length;badge.style.display="block";}
  else{badge.style.display="none";}
}

  document.body.appendChild(panel);
  // Close on outside click

// ── ANALYSE ──
function RANALYSE(){
  var aList=document.getElementById("etude-list");
  if(!aList)return;

  if(!D.chantiers.length){
    aList.innerHTML="<div class='empty'><div class='empty-icon'>📊</div><p>Aucun chantier.</p></div>";
    return;
  }

  // ── TABLE ──
  aList.innerHTML="";
  var table=document.createElement("table");
  table.style.cssText="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:24px";
  var thead=table.createTHead();var hr=thead.insertRow();
  ["Chantier","Début réel","Début prévu","Fin prévue","H. est.","H. réal.","Écart H.","Devis","Coût MO","Coût total","Facturé","Encaissé","Marge","Renta.",""].forEach(function(h){
    var th=document.createElement("th");th.textContent=h;
    th.style.cssText="padding:8px 10px;text-align:left;background:#e2e8f0;border:1px solid var(--brd);font-size:11px;font-weight:600;white-space:nowrap";
    hr.appendChild(th);
  });
  var tbody=table.createTBody();
  D.chantiers.forEach(function(ch){
    var tr=tbody.insertRow();tr.style.cssText="border-bottom:1px solid var(--brd)";
    // Nom
    var tdNom=tr.insertCell();tdNom.style.cssText="padding:8px 10px;border:1px solid var(--brd);font-weight:500;white-space:nowrap";
    var dot=document.createElement("span");dot.style.cssText="display:inline-block;width:8px;height:8px;border-radius:50%;background:"+ch.color+";margin-right:6px";
    tdNom.appendChild(dot);tdNom.appendChild(document.createTextNode((ch.ref?ch.ref+" — ":"")+ch.nom));
    // Dates
    var fmt=function(d){return d?new Date(d).toLocaleDateString("fr-FR"):"—";};
    [ch.dateDebut,ch.dateDebutPrev,ch.dateFinPrev].forEach(function(d){
      var td=tr.insertCell();td.style.cssText="padding:8px 10px;border:1px solid var(--brd);color:var(--muted)";td.textContent=fmt(d);
    });
    // Heures estimées
    var tdEst=tr.insertCell();tdEst.style.cssText="padding:8px 10px;border:1px solid var(--brd);text-align:right";
    tdEst.textContent=ch.heuresEst!=null?ch.heuresEst+"h":"—";
    // Heures réalisées
    var tdReal=tr.insertCell();tdReal.style.cssText="padding:8px 10px;border:1px solid var(--brd);text-align:right";
    tdReal.textContent=ch.heuresReal!=null?ch.heuresReal+"h":"—";
    // Écart
    var tdEcart=tr.insertCell();tdEcart.style.cssText="padding:8px 10px;border:1px solid var(--brd);text-align:right;font-weight:600";
    if(ch.heuresEst!=null&&ch.heuresReal!=null){
      var ecart=ch.heuresReal-ch.heuresEst;
      tdEcart.textContent=(ecart>0?"+":"")+ecart+"h";
      tdEcart.style.color=ecart>0?"#dc2626":ecart<0?"#16a34a":"#475569";
    } else {tdEcart.textContent="—";tdEcart.style.color="var(--muted)";}
    // Avancement barre
    var tdAv=tr.insertCell();tdAv.style.cssText="padding:8px 10px;border:1px solid var(--brd);min-width:80px";
    if(ch.heuresEst&&ch.heuresReal){
      var pct=Math.min(Math.round((ch.heuresReal/ch.heuresEst)*100),150);
      var barColor=pct>100?"#dc2626":pct>80?"#d97706":"#16a34a";
      var barWrap=document.createElement("div");barWrap.style.cssText="background:#e5e7eb;border-radius:4px;height:10px;overflow:hidden";
      var bar=document.createElement("div");bar.style.cssText="height:100%;width:"+Math.min(pct,100)+"%;background:"+barColor+";border-radius:4px";
      barWrap.appendChild(bar);
      var pctTxt=document.createElement("div");pctTxt.style.cssText="font-size:10px;color:#475569;margin-top:2px;text-align:center";pctTxt.textContent=pct+"%";
      tdAv.appendChild(barWrap);tdAv.appendChild(pctTxt);
    } else {tdAv.textContent="—";tdAv.style.color="var(--muted)";}

    // Calcul coût MO = somme heures par salarié × taux
    var coutMO=0;var hasMO=false;
    // Parcourir toutes les cellules du chantier pour compter les heures
    var salHeures={};
    Object.keys(D.cells).forEach(function(ck){
      var parts=ck.split("|");
      var rk=parts[0]+"|"+parts[1];
      if(D.rowChantiers[rk]===ch.id){
        (D.cells[ck]||[]).forEach(function(sid){
          salHeures[sid]=(salHeures[sid]||0)+1; // 1 jour = 1 unité (à affiner)
        });
      }
    });
    Object.keys(salHeures).forEach(function(sid){
      var sal=D.salaries.find(function(s){return s.id===sid;});
      if(sal&&sal.taux){coutMO+=salHeures[sid]*sal.taux*8;hasMO=true;} // 8h/jour
    });
    // Si heuresReal renseignées, utiliser taux moyen
    if(ch.heuresReal&&!hasMO){
      var tauxMoyen=0;var nbSal=0;
      D.salaries.forEach(function(s){if(s.taux){tauxMoyen+=s.taux;nbSal++;}});
      if(nbSal){coutMO=ch.heuresReal*(tauxMoyen/nbSal);hasMO=true;}
    }

    var fmt2=function(v){return v!=null?v.toLocaleString("fr-FR",{minimumFractionDigits:0,maximumFractionDigits:0})+" €":"—";};

    // Devis
    var tdDev=tr.insertCell();tdDev.style.cssText="padding:8px 10px;border:1px solid var(--brd);text-align:right;font-weight:500";
    tdDev.textContent=fmt2(ch.devis);

    // Coût MO
    var tdMO=tr.insertCell();tdMO.style.cssText="padding:8px 10px;border:1px solid var(--brd);text-align:right;color:#0891b2";
    tdMO.textContent=hasMO?Math.round(coutMO).toLocaleString("fr-FR")+" €":"—";

    // Coût total
    var coutTotal=coutMO+(ch.coutMat||0)+(ch.coutST||0)+(ch.coutFrais||0);
    var hasCout=hasMO||ch.coutMat||ch.coutST||ch.coutFrais;
    var tdCT=tr.insertCell();tdCT.style.cssText="padding:8px 10px;border:1px solid var(--brd);text-align:right;font-weight:600";
    tdCT.textContent=hasCout?Math.round(coutTotal).toLocaleString("fr-FR")+" €":"—";

    // Facturé
    var tdFact=tr.insertCell();tdFact.style.cssText="padding:8px 10px;border:1px solid var(--brd);text-align:right";
    tdFact.textContent=fmt2(ch.facture);

    // Encaissé
    var tdEnc=tr.insertCell();tdEnc.style.cssText="padding:8px 10px;border:1px solid var(--brd);text-align:right";
    tdEnc.textContent=fmt2(ch.encaisse);

    // Marge
    var tdMarge=tr.insertCell();tdMarge.style.cssText="padding:8px 10px;border:1px solid var(--brd);text-align:right;font-weight:700";
    if(ch.facture!=null&&hasCout){
      var marge=ch.facture-coutTotal;
      tdMarge.textContent=(marge>=0?"+":"")+Math.round(marge).toLocaleString("fr-FR")+" €";
      tdMarge.style.color=marge>=0?"#16a34a":"#dc2626";
    } else {tdMarge.textContent="—";tdMarge.style.color="var(--muted)";}

    // Rentabilité %
    var tdRenta=tr.insertCell();tdRenta.style.cssText="padding:8px 10px;border:1px solid var(--brd);min-width:80px";
    if(ch.facture&&hasCout&&coutTotal>0){
      var renta=Math.round((ch.facture-coutTotal)/coutTotal*100);
      var rentaColor=renta>=20?"#16a34a":renta>=0?"#d97706":"#dc2626";
      var rWrap=document.createElement("div");rWrap.style.cssText="background:#e5e7eb;border-radius:4px;height:10px;overflow:hidden";
      var rBar=document.createElement("div");rBar.style.cssText="height:100%;width:"+Math.min(Math.max(renta,0),100)+"%;background:"+rentaColor+";border-radius:4px";
      rWrap.appendChild(rBar);

function RGANTT(){
  var gWrap=document.getElementById("gantt-wrap");
  var legend=document.getElementById("gantt-legend");
  if(!gWrap)return;

  var dsEl=document.getElementById("gantt-date-start");
  var deEl=document.getElementById("gantt-date-end");
  var today=new Date();
  var startDate=dsEl&&dsEl.value?new Date(dsEl.value):new Date(today.getFullYear(),0,1);
  var endDate=deEl&&deEl.value?new Date(deEl.value):new Date(today.getFullYear()+1,11,31);
  if(endDate<=startDate)endDate=new Date(startDate.getTime()+365*24*60*60*1000);

  var ganttSel=document.getElementById("gantt-sel");
  if(ganttSel){
    var curVal=ganttSel.value;
    ganttSel.innerHTML='<option value="">Tous les chantiers</option>';
    D.chantiers.forEach(function(c){
      var o=document.createElement("option");o.value=c.id;
      o.textContent=(c.ref?c.ref+" - ":"")+c.nom;
      if(c.id===curVal)o.selected=true;
      ganttSel.appendChild(o);
    });
    if(curVal)ganttSel.value=curVal;
  }
  var ganttFilter=ganttSel?ganttSel.value:"";
  var chantiers=ganttFilter?D.chantiers.filter(function(c){return c.id===ganttFilter;}):D.chantiers;
  // Show all non-finished chantiers
  chantiers=D.chantiers.filter(function(c){return !c.done;});

  function getMon(d){var dt=new Date(d);var day=dt.getDay()||7;dt.setDate(dt.getDate()-(day-1));dt.setHours(0,0,0,0);return dt;}

  var weeks=[];
  var cur2=getMon(startDate);
  while(cur2<=endDate){weeks.push(new Date(cur2));cur2=new Date(cur2.getTime()+7*24*60*60*1000);}

  gWrap.innerHTML="";
  if(!chantiers.length){
    gWrap.innerHTML="<div class='empty'><p>Renseignez des dates dans les fiches chantiers.</p></div>";
    return;
  }

  var LW=180,DW=160,WW=28;
  var wrap=document.createElement("div");wrap.style.cssText="overflow-x:auto;overflow-y:auto;max-height:75vh";
  var tbl=document.createElement("table");
  tbl.style.cssText="border-collapse:collapse;font-size:11px";
  var thead=document.createElement("thead");

  // Row 1: months
  var tr0=document.createElement("tr");
  function mkTH(txt,bg,color,minW,sticky,colSpan){
    var th=document.createElement("th");th.textContent=txt;
    th.style.cssText="border:1px solid #cbd5e1;padding:5px 6px;background:"+(bg||"#e2e8f0")+";color:"+(color||"#1a1916")+";min-width:"+(minW||0)+"px;font-weight:600;text-align:center;white-space:nowrap"+(sticky?";position:sticky;left:0;z-index:3":"");
    if(colSpan)th.colSpan=colSpan;
    return th;
  }
  tr0.appendChild(mkTH("Chantier","#1a1916","#fff",LW,true));
  tr0.appendChild(mkTH("Periode","#1a1916","#fff",DW));

  // Group weeks by month
  var lastM=-1,lastY=-1,curTH=null;
  weeks.forEach(function(w){
    var m=w.getMonth(),y=w.getFullYear();
    if(m!==lastM||y!==lastY){
      lastM=m;lastY=y;
      var colors=["#7c3aed","#0891b2","#16a34a","#d97706","#db2777","#dc2626","#0d9488","#4338ca","#b45309","#0f766e","#be185d","#65a30d"];
      curTH=mkTH(w.toLocaleDateString("fr-FR",{month:"short",year:"numeric"}),colors[m],"#fff",0,false,1);
      tr0.appendChild(curTH);
    } else if(curTH){curTH.colSpan=(curTH.colSpan||1)+1;}
  });
  thead.appendChild(tr0);

  // Row 2: week numbers
  var tr1=document.createElement("tr");
  tr1.appendChild(mkTH("","#e2e8f0","",LW,true));
  tr1.appendChild(mkTH("","#e2e8f0","",DW));
  weeks.forEach(function(w){
    var wk=getISOWeek(w);
    var isNow=(w<=today&&today<new Date(w.getTime()+7*24*60*60*1000));
    var th=mkTH("S"+wk,isNow?"#fef9c3":"#f1f5f9",isNow?"#92400e":"#64748b",WW);
    th.style.fontSize="9px";th.style.padding="2px 0";
    if(isNow)th.style.fontWeight="700";
    tr1.appendChild(th);
  });
  thead.appendChild(tr1);
  tbl.appendChild(thead);

  var tbody=document.createElement("tbody");
  chantiers.forEach(function(ch,ri){
    var tr=document.createElement("tr");
    var bg=ri%2===0?"#fff":"#f8f7f4";

    // Name cell
    var tdN=document.createElement("td");
    tdN.style.cssText="border:1px solid #e2e8f0;padding:4px 8px;font-weight:500;white-space:nowrap;position:sticky;left:0;background:"+bg+";z-index:1;min-width:"+LW+"px";
    var dot=document.createElement("span");dot.style.cssText="display:inline-block;width:8px;height:8px;border-radius:50%;background:"+ch.color+";margin-right:6px";
    tdN.appendChild(dot);
    tdN.appendChild(document.createTextNode((ch.ref?ch.ref+" - ":"")+ch.nom+(ch.ville?" ("+ch.ville+")":"")));
    tr.appendChild(tdN);

    // Dates cell
    var tdD=document.createElement("td");
    tdD.style.cssText="border:1px solid #e2e8f0;padding:4px 8px;font-size:10px;min-width:"+DW+"px";
    var fmt2=function(d){return d?new Date(d).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"2-digit"}):"?";};
    var hh="";
    if(ch.dateDebutPrev&&ch.dateFinPrev){
      hh+="<div style='color:#7c3aed'>&#9633; "+fmt2(ch.dateDebutPrev)+" &#8594; "+fmt2(ch.dateFinPrev)+"</div>";
    } else if(ch.dateDebutPrev){
      hh+="<div style='color:#7c3aed'>&#9633; D&#233;but pr&#233;v: "+fmt2(ch.dateDebutPrev)+"</div>";
    }
    if(ch.dateDebut){
      hh+="<div style='color:"+ch.color+";font-weight:600'>&#9632; D&#233;but r&#233;el: "+fmt2(ch.dateDebut)+"</div>";
    }
    if(!hh)hh="<span style='color:#94a3b8;font-style:italic;font-size:10px'>Cliquer &#9998; pour saisir</span>";
    tdD.innerHTML=hh;
    // Edit button
    var eb3=document.createElement("button");eb3.className="btn";eb3.style.cssText="font-size:10px;padding:1px 5px;margin-top:3px;display:block";eb3.textContent="✏️";
    eb3.onclick=(function(cid){return function(){editGanttDates(cid);};})(ch.id);
    tdD.appendChild(eb3);
    tr.appendChild(tdD);

    var chS=ch.dateDebutPrev?new Date(ch.dateDebutPrev):null;
    var chE=ch.dateFinPrev?new Date(ch.dateFinPrev):null;
    var chR=ch.dateDebut?new Date(ch.dateDebut):null;

    weeks.forEach(function(w){
      var wE=new Date(w.getTime()+7*24*60*60*1000);
      var td=document.createElement("td");
      var isNow2=(w<=today&&today<wE);
      td.style.cssText="border:1px solid #e2e8f0;padding:0;width:"+WW+"px;min-width:"+WW+"px;height:36px;position:relative;background:"+(isNow2?"#fffde7":bg);

      if(chS&&chE&&w<chE&&wE>chS){
        var b=document.createElement("div");
        var isFstP=w<=chS&&wE>chS;var isLstP=w<chE&&wE>=chE;
        b.style.cssText="position:absolute;top:5px;height:11px;"+
          "background:repeating-linear-gradient(45deg,"+ch.color+","+ch.color+" 3px,rgba(255,255,255,0.6) 3px,rgba(255,255,255,0.6) 6px);"+
          "opacity:.85;border-radius:"+(isFstP?"5px 0 0 5px":isLstP?"0 5px 5px 0":"0")+
          ";left:"+(isFstP?"3":"0")+"px;right:"+(isLstP?"3":"0")+"px;border:1px solid "+ch.color;
        td.appendChild(b);
      }
      if(chR&&w<(chE||new Date(9e12))&&wE>chR){
        var bR=document.createElement("div");
        var isFstR=w<=chR&&wE>chR;
        bR.style.cssText="position:absolute;top:20px;height:11px;background:"+ch.color+
          ";opacity:1;left:"+(isFstR?"3":"0")+"px;right:2px;border-radius:"+(isFstR?"5px 0 0 5px":"0")+
          ";box-shadow:0 1px 3px rgba(0,0,0,.2)";
        td.appendChild(bR);
      }
      if(isNow2){var tl=document.createElement("div");tl.style.cssText="position:absolute;top:0;bottom:0;left:50%;width:2px;background:#dc2626;opacity:.5";td.appendChild(tl);}
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);wrap.appendChild(tbl);gWrap.appendChild(wrap);
  if(legend)legend.innerHTML="<span style='margin-right:12px'><span style='display:inline-block;width:20px;height:10px;background:repeating-linear-gradient(45deg,#2563eb,#2563eb 3px,rgba(255,255,255,.6) 3px,rgba(255,255,255,.6) 6px);border:1px solid #2563eb;border-radius:3px;vertical-align:middle'></span> Pr&#233;visionnel (hachuré)</span><span style='margin-right:12px'><span style='display:inline-block;width:20px;height:10px;background:#2563eb;border-radius:3px;vertical-align:middle'></span> R&#233;el (plein)</span><span style='color:#dc2626'>| Aujourd&#39;hui</span>";
}

function ptKey(mois,annee,section,salId,semaine,col){
  return annee+"-"+("0"+mois).slice(-2)+"|"+section+"|"+salId+"|S"+semaine+"|"+col;
}
function ptGet(mois,annee,section,salId,semaine,col){
  if(!D.pointages)D.pointages={};
  var k=ptKey(mois,annee,section,salId,semaine,col);
  return D.pointages[k]!==undefined?D.pointages[k]:"";
}
function ptSet(mois,annee,section,salId,semaine,col,val){
  if(!D.pointages)D.pointages={};
  D.pointages[ptKey(mois,annee,section,salId,semaine,col)]=val;
  save();
}

function getISOWeek(d){
  var dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  var dn=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-dn);
  var ys=new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return Math.ceil((((dt-ys)/86400000)+1)/7);
}
function getWeeksOfMonth(mois,annee){
  var weeks=[],seen={},d=new Date(annee,mois-1,1);
  while(d.getMonth()===mois-1){
    if(d.getDay()>=1&&d.getDay()<=5){var wk=getISOWeek(d);if(!seen[wk]){seen[wk]=1;weeks.push(wk);}}
    d.setDate(d.getDate()+1);
  }
  return weeks;
}
function getDatesOfWeek(wk,annee){
  var s=new Date(annee,0,1+((wk-1)*7)),dow=s.getDay(),mon=new Date(s);
  if(dow<=4)mon.setDate(s.getDate()-s.getDay()+1);else mon.setDate(s.getDate()+8-s.getDay());
  var days=[];
  for(var i=0;i<5;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);days.push(d);}
  return days;
}

// Get chantier hours per day for a salarié — returns array of {chId, chNom, hours}
function getChantierHoursPerDay(salId, date){
  var yw=date.getFullYear();
  var cw=yw+"-"+("0"+(date.getMonth()+1)).slice(-2)+"-"+("0"+date.getDate()).slice(-2);
  // Find Monday of that week
  var dow=date.getDay()||7;
  var mon=new Date(date);mon.setDate(date.getDate()-(dow-1));
  var cwMon=mon.getFullYear()+"-"+("0"+(mon.getMonth()+1)).slice(-2)+"-"+("0"+mon.getDate()).slice(-2);
  var di=dow-1; // 0=Mon
  var n=typeof getNR==="function"?getNR():6;
  var result=[];
  for(var r=0;r<n;r++){
    var ck=cwMon+"|"+r+"|"+di;
    if((D.cells[ck]||[]).indexOf(salId)>=0){
      var chId=D.rowChantiers[cwMon+"|"+r];
      var ch=chId?D.chantiers.find(function(c){return c.id===chId;}):null;
      result.push({chId:chId||"inconnu",chNom:ch?ch.nom:"+ chantier",hours:7.5});
    }
  }
  return result;
}


// ── BILAN HEURES CHANTIERS (ANNUEL) ──
function RBILAN(){
  var wrap=document.getElementById("bilan-wrap");
  if(!wrap)return;

  var yearSel=document.getElementById("bilan-annee");
  var curYear=yearSel?parseInt(yearSel.value)||new Date().getFullYear():new Date().getFullYear();
  if(yearSel&&!yearSel.options.length){
    for(var y=new Date().getFullYear()-2;y<=new Date().getFullYear()+3;y++){
      var o=document.createElement("option");o.value=y;o.textContent=y;if(y===curYear)o.selected=true;yearSel.appendChild(o);
    }
  }
  var annee=yearSel?parseInt(yearSel.value)||curYear:curYear;
  var totalMode=(document.getElementById("bilan-total-mode")||{}).value||"all";

  var monthsList=[];
  for(var mois=1;mois<=12;mois++)monthsList.push({mois:mois,annee:annee});

  var MOIS_NOMS=["","Jan","F\u00e9v","Mar","Avr","Mai","Jun","Jul","Ao\u00fb","Sep","Oct","Nov","D\u00e9c"];
  var bilan={};
  // Special rows: Formation, Intempéries (from Pointage rubriques, in hours not days)
  var special={
    formation:{nom:"\uD83D\uDCDA Formation",totalH:0,bySalarie:{},byMonth:{},isSpecial:true},
    intemp:{nom:"\uD83C\uDF27\uFE0F Intemp\u00e9ries",totalH:0,bySalarie:{},byMonth:{},isSpecial:true},
    interim:{nom:"\uD83D\uDC65 Int\u00e9rimaires (total)",totalH:0,bySalarie:{},byMonth:{},isSpecial:true},
    stagiaire:{nom:"\uD83C\uDF93 Stagiaires (total)",totalH:0,bySalarie:{},byMonth:{},isSpecial:true},
    apprenti:{nom:"\uD83D\uDD27 Apprentis (total)",totalH:0,bySalarie:{},byMonth:{},isSpecial:true}
  };
  function isInterimSal(sal){
    if(sal.type==="interimaire")return true;
    var txt=((sal.prenom||"")+" "+(sal.nom||"")).toLowerCase();
    return txt.indexOf("interim")>=0||txt.indexOf("int\u00e9rim")>=0;
  }
  function isStagiaireSal(sal){
    if(sal.type==="stagiaire")return true;
    var txt=((sal.prenom||"")+" "+(sal.nom||"")).toLowerCase();
    return txt.indexOf("stagiaire")>=0;
  }
  function isApprentiSal(sal){
    return sal.type==="apprenti";
  }

  monthsList.forEach(function(mp){
    var mo=mp.mois,an=mp.annee;
    var weeks=getWeeksOfMonth(mo,an);
    D.salaries.forEach(function(sal){
      // Chantiers
      D.chantiers.forEach(function(ch){
        weeks.forEach(function(wk){
          getDatesOfWeek(wk,an).forEach(function(dt,di){
            var inM=(dt.getMonth()+1===mo&&dt.getFullYear()===an);
            if(!inM)return;
            var raw=ptGet(mo,an,"ch_"+ch.id,sal.id,wk,di);
            var h=parseFloat(raw)||0;
            if(!raw){
              var assigned=getChantierHoursPerDay(sal.id,dt).find(function(e){return e.chId===ch.id;});
              if(assigned)h=assigned.hours;
            }
            if(h>0){
              if(!bilan[ch.id])bilan[ch.id]={nom:(ch.ref?ch.ref+" - ":"")+ch.nom,color:ch.color,totalH:0,bySalarie:{},byMonth:{},isBureau:ch.ref==="9200"};
              bilan[ch.id].totalH+=h;
              if(!bilan[ch.id].bySalarie[sal.id])bilan[ch.id].bySalarie[sal.id]={nom:(sal.nom?sal.nom+" ":"")+sal.prenom,h:0};
              bilan[ch.id].bySalarie[sal.id].h+=h;
              bilan[ch.id].byMonth[mo]=(bilan[ch.id].byMonth[mo]||0)+h;
              // Track interim/stagiaire/apprenti hours separately
              [["interim",isInterimSal],["stagiaire",isStagiaireSal],["apprenti",isApprentiSal]].forEach(function(pair){
                var key=pair[0],fn=pair[1];
                if(fn(sal)){
                  special[key].totalH+=h;
                  if(!special[key].bySalarie[sal.id])special[key].bySalarie[sal.id]={nom:(sal.nom?sal.nom+" ":"")+sal.prenom,h:0};
                  special[key].bySalarie[sal.id].h+=h;
                  special[key].byMonth[mo]=(special[key].byMonth[mo]||0)+h;
                }
              });
            }
          });
        });
      });
      // Formation et Intempéries (rubriques en heures)
      ["formation","intemp"].forEach(function(rkey){
        weeks.forEach(function(wk){
          getDatesOfWeek(wk,an).forEach(function(dt,di){
            var inM2=(dt.getMonth()+1===mo&&dt.getFullYear()===an);
            if(!inM2)return;
            var hv=parseFloat(ptGet(mo,an,rkey,sal.id,wk,di))||0;
            if(hv>0){
              special[rkey].totalH+=hv;
              if(!special[rkey].bySalarie[sal.id])special[rkey].bySalarie[sal.id]={nom:(sal.nom?sal.nom+" ":"")+sal.prenom,h:0};
              special[rkey].bySalarie[sal.id].h+=hv;
              special[rkey].byMonth[mo]=(special[rkey].byMonth[mo]||0)+hv;
            }
          });
        });
      });
    });
  });

  var chIds=Object.keys(bilan).sort(function(a,b){return bilan[b].totalH-bilan[a].totalH;});
  var specialIds=Object.keys(special).filter(function(k){return special[k].totalH>0;});
  var totalSpecialIds=specialIds.filter(function(k){return ["interim","stagiaire","apprenti"].indexOf(k)<0;}); // informational only, not added to grand total

  if(!chIds.length&&!specialIds.length){
    wrap.innerHTML="<div class='empty'><div class='empty-icon'>\uD83D\uDCCA</div><p>Aucune heure saisie pour "+annee+". Renseignez les heures dans l'onglet Pointage.</p></div>";
    return;
  }

  var html="<table style='border-collapse:collapse;font-size:11px;width:100%'>";
  html+="<tr>";
  html+="<th style='border:1px solid #cbd5e1;padding:6px 10px;background:#1a1916;color:#fff;text-align:left;min-width:200px'>Chantier / Rubrique</th>";
  for(var m=1;m<=12;m++)html+="<th style='border:1px solid #cbd5e1;padding:6px 6px;background:#1a1916;color:#fff;text-align:center;min-width:50px'>"+MOIS_NOMS[m]+"</th>";
  html+="<th style='border:1px solid #cbd5e1;padding:6px 10px;background:#7c3aed;color:#fff;text-align:center;font-weight:700'>Total ann\u00e9e</th>";
  html+="</tr>";

  function renderRow(item,ri,colorDot){
    var rowBg=ri%2===0?"#fff":"#f8f7f4";
    var rowHtml="<tr style='cursor:pointer' onclick='toggleBilanDetail(\""+item._id+"\")'>";
    rowHtml+="<td style='border:1px solid #e2e8f0;padding:5px 10px;font-weight:500;background:"+rowBg+"'>"+(colorDot?"<span style='display:inline-block;width:8px;height:8px;border-radius:50%;background:"+colorDot+";margin-right:6px'></span>":"")+item.nom+" <span style='font-size:9px;color:#94a3b8'>\u25BE</span></td>";
    for(var mm=1;mm<=12;mm++){
      var mh=item.byMonth[mm]||0;
      rowHtml+="<td style='border:1px solid #e2e8f0;padding:5px 6px;text-align:center;background:"+rowBg+";color:"+(mh>0?"#1a1916":"#cbd5e1")+"'>"+(mh>0?mh.toFixed(1):"\u2014")+"</td>";
    }
    rowHtml+="<td style='border:1px solid #e2e8f0;padding:5px 10px;text-align:center;font-weight:700;background:#ede9fe;color:#7c3aed'>"+item.totalH.toFixed(1)+"h</td>";
    rowHtml+="</tr>";
    rowHtml+="<tr id='bilan-detail-"+item._id+"' style='display:none'><td colspan='14' style='border:1px solid #e2e8f0;padding:8px 16px;background:#f0f9ff'>";
    var salIds=Object.keys(item.bySalarie).sort(function(a,c){return item.bySalarie[c].h-item.bySalarie[a].h;});
    rowHtml+="<div style='font-size:10px;font-weight:700;color:#0891b2;margin-bottom:4px'>D\u00e9tail par salari\u00e9 :</div><div style='display:flex;flex-wrap:wrap;gap:8px'>";
    salIds.forEach(function(sid){rowHtml+="<span style='background:#fff;border:1px solid #bae6fd;border-radius:5px;padding:3px 8px;font-size:10px'>"+item.bySalarie[sid].nom+" : <b>"+item.bySalarie[sid].h.toFixed(1)+"h</b></span>";});
    rowHtml+="</div></td></tr>";
    return rowHtml;
  }

  // Render special rows first (Formation, Intempéries) in a distinct section
  if(specialIds.length){
    specialIds.forEach(function(sk,si){
      special[sk]._id="special_"+sk;
      html+=renderRow(special[sk],si,null).replace("font-weight:500","font-weight:600;color:#92400e");
    });
    html+="<tr><td colspan='14' style='height:4px;background:#e2e8f0;border:none'></td></tr>";
  }

  var grandTotal=0,grandTotalFiltered=0;
  var monthTotals={},monthTotalsFiltered={};

  chIds.forEach(function(chId,ri){
    var b=bilan[chId];b._id=chId;
    html+=renderRow(b,ri,b.color);
    grandTotal+=b.totalH;
    var includeInFiltered=true;
    if(totalMode==="no_bureau"&&b.isBureau)includeInFiltered=false;
    if(totalMode==="no_bureau_intemp"&&b.isBureau)includeInFiltered=false;
    if(includeInFiltered)grandTotalFiltered+=b.totalH;
    for(var mm2=1;mm2<=12;mm2++){
      var mh2=b.byMonth[mm2]||0;
      monthTotals[mm2]=(monthTotals[mm2]||0)+mh2;
      if(includeInFiltered)monthTotalsFiltered[mm2]=(monthTotalsFiltered[mm2]||0)+mh2;
    }
  });
  // Add special hours to totals (unless excluded) — interim excluded since already counted in chantiers
  totalSpecialIds.forEach(function(sk){
    grandTotal+=special[sk].totalH;
    var includeSpecial=!(totalMode==="no_bureau_intemp"&&sk==="intemp");
    if(includeSpecial)grandTotalFiltered+=special[sk].totalH;
    for(var mm3=1;mm3<=12;mm3++){
      var mh3=special[sk].byMonth[mm3]||0;
      monthTotals[mm3]=(monthTotals[mm3]||0)+mh3;
      if(includeSpecial)monthTotalsFiltered[mm3]=(monthTotalsFiltered[mm3]||0)+mh3;
    }
  });

  html+="<tr style='background:#1a1916'>";
  html+="<td style='border:1px solid #cbd5e1;padding:6px 10px;color:#fff;font-weight:700'>TOTAL ("+(totalMode==="all"?"tout inclus":totalMode==="no_bureau"?"sans Bureau":"sans Bureau ni Intemp.")+")</td>";
  for(var mt=1;mt<=12;mt++){
    html+="<td style='border:1px solid #cbd5e1;padding:6px 6px;text-align:center;color:#fff;font-weight:600'>"+(monthTotalsFiltered[mt]?monthTotalsFiltered[mt].toFixed(1):"\u2014")+"</td>";
  }
  html+="<td style='border:1px solid #cbd5e1;padding:6px 10px;text-align:center;font-weight:800;background:#7c3aed;color:#fff'>"+grandTotalFiltered.toFixed(1)+"h</td>";
  html+="</tr>";

  html+="</table>";
  wrap.innerHTML=html;
}

  var hdr=["Chantier"];
  for(var m2=1;m2<=12;m2++)hdr.push(MOIS_NOMS[m2]);
  hdr.push("Total ann\u00e9e");
  lines.push(hdr.join("\t"));
  Object.keys(bilan).sort(function(a,b){return bilan[b].totalH-bilan[a].totalH;}).forEach(function(chId){
    var b=bilan[chId];
    var row=[b.nom];
    for(var mm2=1;mm2<=12;mm2++)row.push(b.byMonth[mm2]?b.byMonth[mm2].toFixed(1):"0");
    row.push(b.totalH.toFixed(1));
    lines.push(row.join("\t"));
  });
  var blob=new Blob(["\uFEFF"+lines.join("\n")],{type:"text/tab-separated-values;charset=utf-8"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="Bilan_heures_chantiers_"+annee+".csv";a.click();
  showToast("\uD83D\uDCE5 Export t\u00e9l\u00e9charg\u00e9 !");
}

function RPOINTAGE(){

    weeks.forEach(function(wk){

      html+="<th colspan='"+span+"' style='"+thStyle()+"background:#c7d2fe;color:#3730a3'>S"+wk+"</th>";
    });
    html+="</tr>";

    // Sub-header: dates
    html+="<tr>";
    html+="<th style='"+thStyle()+"'></th>";
    html+="<th style='"+thStyle()+"background:#dbeafe'></th>";
    weeks.forEach(function(wk){
      var dates=getDatesOfWeek(wk,annee);
      dates.forEach(function(dt,di){
        var inM=(dt.getMonth()+1===mois&&dt.getFullYear()===annee);
        html+="<th style='"+thStyle()+"width:36px;opacity:"+(inM?1:0.35)+"'>"+PT_DAYS[di]+"<br><span style='font-size:9px;color:#64748b'>"+dt.getDate()+"/"+(dt.getMonth()+1)+"</span></th>";
      });
      html+="<th style='"+thStyle()+"width:45px;background:#fef9c3'>Total</th>";
    });
    html+="</tr>";

    // Rows
    PT_ROWS.forEach(function(row){
      html+="<tr>";
      html+="<td style='"+tdStyle()+"font-weight:500;white-space:nowrap;background:#f8f7f4'>"+row.label+(row.unit?" ("+row.unit+")":"")+"</td>";

      // Mois total
      var totalMois=0;
      var zoneCounts={};
      weeks.forEach(function(wk){
        var dates2=getDatesOfWeek(wk,annee);
        for(var d=0;d<5;d++){
          var dt2=dates2[d];
          var inM0=(dt2.getMonth()+1===mois&&dt2.getFullYear()===annee);
          if(!inM0)continue;
          if(row.type==="zone_dd"){
            var zv=ptGet(mois,annee,row.id,sal.id,wk,d);
            if(zv){totalMois+=1;zoneCounts[zv]=(zoneCounts[zv]||0)+1;}
          } else if(row.type==="rtt"){
            var storedRttM=ptGet(mois,annee,row.id,sal.id,wk,d);
            var defRttM=d<4?"0.5":"0";
            totalMois+=parseFloat(storedRttM!==""?storedRttM:defRttM)||0;
          } else if(row.type==="check"){
            totalMois+=parseFloat(ptGet(mois,annee,row.id,sal.id,wk,d))||0;
          } else if(row.id==="conduite"){

              html+="<td style='"+tdStyle()+"background:#f5f5f5'></td>";

            }
          } else if(row.type==="zone_dd"){
            var inMz=(dt.getMonth()+1===mois&&dt.getFullYear()===annee);
            if(!inMz){
              html+="<td style='"+tdStyle()+"background:#f5f5f5'></td>";
            } else {
              var zval=ptGet(mois,annee,row.id,sal.id,wk,di)||"";
              // Auto-suggest zone from chantier worked this day, only if salarié used personal vehicle (chip P)
              if(!zval){
                var dtZ=getDatesOfWeek(wk,annee)[di];
                if(isPersoVehDay(sal.id,dtZ)){
                  var chZ=getChantierForSalDay(sal.id,dtZ);
                  if(chZ){
                    var siegeZ=getSiegeForSal(sal)===SIEGE_FONTEVRAUD?"fontevraud":"ecouflant";
                    zval=(siegeZ==="fontevraud"?chZ.zoneFontevraud:chZ.zoneEcouflant)||"";
                  }
                }
              }
              wkTotal+=(zval?1:0);
              var zopts="<option value=''></option>";
              ["Z1A","Z1B","Z2","Z3","Z4","Z5","Z6","Z7","Z8","Z9","Z10"].forEach(function(z){
                zopts+="<option value='"+z+"'"+(zval===z?" selected":"")+">"+z+"</option>";
              });
              var zc=zval?(ZONE_COLORS[zval]||{bg:"#fff",border:"#e2e8f0"}):{bg:"#fff",border:"#e2e8f0"};
              html+="<td style='"+tdStyle()+"padding:1px;text-align:center;background:"+zc.bg+"'><select style='width:48px;height:22px;border:1px solid "+zc.border+";border-radius:3px;font-size:10px;outline:none;padding:0 2px;background:"+zc.bg+";font-weight:600' data-pt='"+mois+"|"+annee+"|"+row.id+"|"+sal.id+"|"+wk+"|"+di+"' onchange='ptZoneChange(this)'>"+zopts+"</select></td>";
            }
          } else if(row.type==="check"){
            var inM2=(dt.getMonth()+1===mois&&dt.getFullYear()===annee);
            var checked=val=="1"&&inM2;
            wkTotal+=checked?1:0;
            if(inM2){
              html+="<td style='"+tdStyle()+"text-align:center;padding:2px'><input type='checkbox' "+(checked?"checked":"")+" style='width:15px;height:15px;accent-color:#2563eb;cursor:pointer' data-pt='"+mois+"|"+annee+"|"+row.id+"|"+sal.id+"|"+wk+"|"+di+"' onchange='ptCB(this)'></td>";
            } else {
              html+="<td style='"+tdStyle()+"background:#f5f5f5'></td>";
            }
          } else {
            var inM3=(dt.getMonth()+1===mois&&dt.getFullYear()===annee);

            if(inM3){
              if(row.id==="conduite"){
                // Auto-detect chantier from planning for this day, show suggested value + validation checkbox

                html+="<td style='"+tdStyle()+"padding:2px;text-align:center'>";

              html+="<td style='"+tdStyle()+"background:#f5f5f5'></td>";

        });
        if(row.type==="zone_dd"){

          getDatesOfWeek(wk,annee).forEach(function(dt2,di2){
            var inMz2=(dt2.getMonth()+1===mois&&dt2.getFullYear()===annee);
            if(!inMz2)return;
            var zv2=ptGet(mois,annee,row.id,sal.id,wk,di2);
            if(zv2)wkZones[zv2]=(wkZones[zv2]||0)+1;

    if(sal.isBureau){
